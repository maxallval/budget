const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const dayBef=s=>{const d=parseD(s);d.setDate(d.getDate()-1);return dStr(d);};
function getNthWD(date){let c=0;const d=new Date(date.getFullYear(),date.getMonth(),1);while(d<=date){if(d.getDay()===date.getDay())c++;d.setDate(d.getDate()+1);}return c;}
function normRec(rec,s){if(rec&&typeof rec==="object")return rec;const wd=s instanceof Date?s.getDay():parseD(String(s||"2024-01-01")).getDay();return({once:{type:"once"},daily:{type:"daily"},weekly:{type:"weekly",weekday:wd},monthly:{type:"monthly_day"},annual:{type:"annually"}})[rec]||{type:"once"};}

function occsInMonth(tx,yr,mo){
  const ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0);
  const s=parseD(tx.startDate),e=tx.endDate?parseD(tx.endDate):null;
  const ex=new Set(tx.exceptions||[]);const r=normRec(tx.recurrence,s);
  if(s>me||(e&&e<ms))return[];
  const ok=d=>d>=ms&&d<=me&&d>=s&&(!e||d<=e)&&!ex.has(dStr(d));
  const snap=d=>new Date(d.getTime());
  if(r.type==="once")return ok(s)?[s.getDate()]:[];
  if(r.type==="daily"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="weekly"){const twd=r.weekday!==undefined?r.weekday:s.getDay();const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const res=[];const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+7);}return res;}
  if(r.type==="monthly_day"){const day=s.getDate();if(day>me.getDate())return[];const d=new Date(yr,mo,day);return ok(d)?[day]:[];}
  if(r.type==="monthly_nth_weekday"){const{nth,weekday:wd2}=r;let c=0;for(let dy=1;dy<=me.getDate();dy++){const d=new Date(yr,mo,dy);if(d.getDay()===wd2){c++;if(c===nth)return ok(d)?[dy]:[]; }}return[];}
  if(r.type==="annually"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];const d=new Date(yr,mo,s.getDate());return ok(d)?[s.getDate()]:[];}
  if(r.type==="weekdays"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){const w=d.getDay();if(w>0&&w<6&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="custom"){const{interval:iv=1,unit:u="day",weekdays:wds=[]}=r;const res=[];
    if(u==="day"){const d=new Date(s>ms?s:ms);while(d<=me){if(Math.round((d-s)/86400000)%iv===0&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}}
    else if(u==="week"){const wdSet=new Set(wds.length>0?wds:[s.getDay()]);wdSet.forEach(twd=>{const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+iv*7);}});res.sort((a,b)=>a-b);}
    else if(u==="month"){const sm=s.getMonth()+s.getFullYear()*12,cm=mo+yr*12;if((cm-sm)<0||(cm-sm)%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    else if(u==="year"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];if((yr-s.getFullYear())%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    return res;}
  return[];
}

function countOccs(tx,upTo){
  const s=parseD(tx.startDate);if(s>upTo)return 0;
  let count=0,y=s.getFullYear(),m=s.getMonth();
  const ey=upTo.getFullYear(),em=upTo.getMonth();let its=0;
  while((y<ey||(y===ey&&m<=em))&&its++<1200){
    const ocs=occsInMonth(tx,y,m);for(const d of ocs)if(new Date(y,m,d)<=upTo)count++;
    m++;if(m>11){m=0;y++;}
  }
  return count;
}

const rawBalAt=(txs,init,date)=>txs.reduce((b,tx)=>b+(tx.type==="income"?1:-1)*tx.amount*countOccs(tx,date),init);
const cleanTxs=txs=>txs.filter(tx=>{const r=normRec(tx.recurrence,parseD(tx.startDate));if(r.type==="once"){const ex=new Set(tx.exceptions||[]);if(ex.has(tx.startDate))return false;}return true;});
const fA=(n,full=false)=>{const a=Math.abs(n);let nm;if(full){nm=a.toLocaleString("fr-CA",{minimumFractionDigits:2,maximumFractionDigits:2});}else{if(a>=10000)nm=(a/1000).toFixed(1)+"k";else if(a>=1000)nm=(a/1000).toFixed(2)+"k";else nm=a.toFixed(2);}return nm+" $";};
const addMonths=(yr,mo,n)=>{let m=mo+n,y=yr;while(m>11){m-=12;y++;}while(m<0){m+=12;y--;}return{yr:y,mo:m};};

function relTimeStr(lastSync){
  if(!lastSync)return"Jamais synchronisé";
  const secs=Math.floor((Date.now()-lastSync.getTime())/1000);
  if(secs<15)return"Synchronisé à l'instant";
  if(secs<60)return`Synchronisé il y a ${secs} seconde${secs>1?"s":""}`;
  const mins=Math.floor(secs/60);if(mins<60)return`Synchronisé il y a ${mins} minute${mins>1?"s":""}`;
  const hrs=Math.floor(mins/60);return`Synchronisé il y a ${hrs} heure${hrs>1?"s":""}`;
}

function recLabel(tx){
  const DAYS=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const NTH=["","1er","2e","3e","4e","5e"];
  const DS=["D","L","M","M","J","V","S"];
  const s=parseD(tx.startDate);const r=normRec(tx.recurrence,s);const wd=r.weekday!==undefined?r.weekday:s.getDay();
  switch(r.type){
    case"once":return"Une fois";case"daily":return"Tous les jours";
    case"weekly":return`Toutes les semaines le ${DAYS[wd]}`;
    case"monthly_day":return"Tous les mois";
    case"monthly_nth_weekday":return`Tous les mois, le ${NTH[r.nth]||r.nth} ${DAYS[r.weekday]}`;
    case"annually":return`Annuellement le ${s.getDate()} ${MONTHS[s.getMonth()]}`;
    case"weekdays":return"Jours de semaine (lun.–ven.)";
    case"custom":{const{interval:iv=1,unit:u="week",weekdays:wds=[]}=r;const units={day:"jours",week:"semaines",month:"mois",year:"années"};let lb=`Se répète tous les ${iv>1?iv+" ":""}${units[u]||u}`;if(u==="week"&&wds.length>0)lb+=" · "+wds.map(w=>DS[w]).join(" ");return lb;}
    default:return"Une fois";
  }
}

function LineChart({data,color,th,height=120}){
  if(!data||data.length<2)return null;
  const W=560,H=height,pad={t:12,b:28,l:44,r:12};
  const vals=data.map(d=>d.y);const mn=Math.min(...vals),mx=Math.max(...vals);const rng=mx-mn||1;
  const px=i=>pad.l+(i/(data.length-1))*(W-pad.l-pad.r);
  const py=v=>pad.t+(1-(v-mn)/rng)*(H-pad.t-pad.b);
  const pts=data.map((d,i)=>({x:px(i),y:py(d.y),label:d.label}));
  const pathD="M"+pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join("L");
  const areaD=pathD+`L${pts[pts.length-1].x.toFixed(1)},${(H-pad.b).toFixed(1)}L${pts[0].x.toFixed(1)},${(H-pad.b).toFixed(1)}Z`;
  const gradId="lg_"+color.replace("#","");const yTicks=[mn,mn+rng/2,mx];
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block",overflow:"visible"}}>
    <defs><linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0.01"/></linearGradient></defs>
    {yTicks.map((v,i)=><line key={i} x1={pad.l} x2={W-pad.r} y1={py(v)} y2={py(v)} stroke={th.border} strokeWidth="1"/>)}
    <path d={areaD} fill={`url(#${gradId})`}/><path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke={th.sheetBg} strokeWidth="1.5"/>)}
    {pts.filter((_,i)=>i%2===0||data.length<=7).map((p,i)=>(<text key={i} x={p.x} y={H-6} textAnchor="middle" fontSize="9" fill={th.muted}>{p.label}</text>))}
    {yTicks.map((v,i)=>(<text key={i} x={pad.l-4} y={py(v)+3.5} textAnchor="end" fontSize="9" fill={th.muted}>{v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0)}</text>))}
  </svg>);
}
function BarChart2({data,th,height=140}){
  if(!data||data.length===0)return null;
  const W=560,H=height,pad={t:8,b:28,l:4,r:4};
  const maxV=Math.max(...data.map(d=>Math.max(d.inc,d.exp)),1);
  const slotW=(W-pad.l-pad.r)/data.length;const barW=slotW*0.7,gap=slotW*0.15;const bh=v=>((v/maxV)*(H-pad.t-pad.b));
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block",overflow:"visible"}}>
    {data.map((d,i)=>{const x=pad.l+i*slotW+gap;const incH=bh(d.inc),expH=bh(d.exp);const bw=barW/2-1;return(<g key={i}><rect x={x} y={H-pad.b-incH} width={bw} height={Math.max(incH,1)} rx="2" fill="#10b981" opacity="0.85"/><rect x={x+bw+2} y={H-pad.b-expH} width={bw} height={Math.max(expH,1)} rx="2" fill="#ef4444" opacity="0.75"/>{(i%2===0||data.length<=7)&&<text x={x+bw} y={H-6} textAnchor="middle" fontSize="9" fill={th.muted}>{d.label}</text>}</g>);})}
    <line x1={pad.l} x2={W-pad.r} y1={H-pad.b} y2={H-pad.b} stroke={th.border} strokeWidth="1"/>
  </svg>);
}

function RecurrencePicker({value,onChange,startDate,th}){
  const DAYS=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const DAYSS=["D","L","M","M","J","V","S"];
  const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const NTH=["","1er","2e","3e","4e","5e"];
  const UNITS=[{v:"day",l:"jours"},{v:"week",l:"semaines"},{v:"month",l:"mois"},{v:"year",l:"années"}];
  const s=useMemo(()=>parseD(startDate),[startDate]);
  const wd=s.getDay(),nth=getNthWD(s);
  const nr=useMemo(()=>normRec(value,s),[value,s]);
  const isCust=nr.type==="custom";
  const opts=useMemo(()=>[
    {rec:{type:"once"},label:"Une fois"},{rec:{type:"daily"},label:"Tous les jours"},
    {rec:{type:"weekly",weekday:wd},label:`Toutes les semaines le ${DAYS[wd]}`},
    {rec:{type:"monthly_nth_weekday",nth,weekday:wd},label:`Tous les mois, le ${NTH[nth]||nth} ${DAYS[wd]}`},
    {rec:{type:"annually"},label:`Annuellement le ${s.getDate()} ${MONTHS[s.getMonth()]}`},
    {rec:{type:"weekdays"},label:"Jours de semaine (lun.–ven.)"},
    {rec:null,isCustom:true,label:"Personnaliser"}
  ],[s,wd,nth]);
  const selIdx=useMemo(()=>{if(isCust)return 6;return opts.findIndex(o=>{if(!o.rec)return false;if(o.rec.type!==nr.type)return false;if(o.rec.type==="weekly")return o.rec.weekday===nr.weekday;if(o.rec.type==="monthly_nth_weekday")return o.rec.nth===nr.nth&&o.rec.weekday===nr.weekday;return true;});},[nr,opts,isCust]);
  const[ivRaw,setIvRaw]=useState(()=>nr.interval!=null&&nr.interval>1?String(nr.interval):"");
  useEffect(()=>{setIvRaw(nr.interval!=null&&nr.interval>1?String(nr.interval):"");},[nr.type]);
  const handleIv=v=>{setIvRaw(v);const n=parseInt(v);onChange({...nr,interval:(!v||isNaN(n)||n<1)?1:n});};
  return(<div>
    <label style={{fontSize:10,color:th.muted,letterSpacing:"0.1em",textTransform:"uppercase"}}>Récurrence</label>
    <div style={{marginTop:10,border:"1px solid "+th.border,borderRadius:14,overflow:"hidden"}}>
      {opts.map((opt,i)=>(
        <div key={i}>
          <button onClick={()=>{if(opt.isCustom){if(!isCust){setIvRaw("");onChange({type:"custom",interval:1,unit:"week",weekdays:[wd]});}}else onChange(opt.rec);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:selIdx===i?th.surface:"none",border:"none",borderBottom:i<opts.length-1?"1px solid "+th.border:"none",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,border:selIdx===i?"5px solid "+th.text:"2px solid "+th.muted,background:th.bg}}/>
            <span style={{fontSize:13,color:th.text}}>{opt.label}</span>
          </button>
          {opt.isCustom&&isCust&&(
            <div style={{padding:"14px 14px 16px 44px",background:th.surface,borderTop:"1px solid "+th.border}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:th.sub}}>Se répète tous les</span>
                <input type="number" min="1" value={ivRaw} onChange={e=>handleIv(e.target.value)} style={{width:52,padding:"5px 8px",fontSize:13,color:th.text,background:th.bg,border:"1px solid "+th.border,borderRadius:7,outline:"none",textAlign:"center"}}/>
                <select value={nr.unit||"week"} onChange={e=>onChange({...nr,unit:e.target.value})} style={{fontSize:13,color:th.text,background:th.bg,border:"1px solid "+th.border,borderRadius:7,padding:"5px 8px",outline:"none",cursor:"pointer"}}>
                  {UNITS.map(u=><option key={u.v} value={u.v}>{u.l}</option>)}
                </select>
              </div>
              {(nr.unit||"week")==="week"&&(<div style={{display:"flex",gap:5,marginTop:12}}>
                {DAYSS.map((d,di)=>{const wds=nr.weekdays||[wd],on=wds.includes(di);return(<button key={di} onClick={()=>{let nw=on?wds.filter(x=>x!==di):[...wds,di];if(nw.length===0)nw=[di];onChange({...nr,weekdays:nw});}} style={{width:33,height:33,borderRadius:"50%",fontSize:12,fontWeight:500,background:on?th.btnBg:th.bg,color:on?th.btnText:th.sub,border:"1.5px solid "+(on?th.btnBg:th.border),cursor:"pointer"}}>{d}</button>);})}
              </div>)}
            </div>
          )}
        </div>
      ))}
    </div>
  </div>);
}

async function doPush(json,token,gistId){
  const body={files:{"budget.json":{content:json}}};
  const url=gistId?`https://api.github.com/gists/${gistId}`:"https://api.github.com/gists";
  const res=await fetch(url,{method:gistId?"PATCH":"POST",headers:{"Authorization":"token "+token,"Content-Type":"application/json"},body:JSON.stringify(gistId?body:{...body,description:"Budget App Data",public:false})});
  if(!res.ok){let msg="HTTP "+res.status;try{const d=await res.json();msg=d.message||msg;}catch(e){}throw new Error(msg);}
  return res.json();
}

          </button>)}
          <p style={{...lbl,margin:"24px 0 4px"}}>Sauvegarde</p>

      </div>

      {/* ═══ MODALS ═══ */}
      {exportMod&&<Sheet onClose={()=>setExportMod(false)} th={th}><SheetHead title="Exporter les données" onClose={()=>setExportMod(false)} th={th}/><p style={{fontSize:12,color:th.sub,marginBottom:12}}>Copiez ce JSON et conservez-le en lieu sûr.</p><textarea readOnly value={getExportJSON()} style={{width:"100%",height:180,padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:th.sub,background:th.surface,border:"1px solid "+th.border,borderRadius:10,resize:"none",boxSizing:"border-box",lineHeight:1.5}}/><div style={{display:"flex",gap:8,marginTop:12}}><button onClick={()=>setExportMod(false)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>Fermer</button><button onClick={handleCopy} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:copied?"#059669":th.btnBg,color:copied?"#fff":th.btnText,cursor:"pointer",fontWeight:500}}>{copied?"Copié ✓":"Copier"}</button></div></Sheet>}

          right={<button onClick={()=>{setDayMod(null);openForm(null,dayModalDateStr);}} style={{fontSize:12,color:th.sub,background:"none",border:"1px solid "+th.border,borderRadius:8,padding:"5px 11px",cursor:"pointer"}}>+ Ajouter</button>}

      </Sheet>}

      {formMod&&(<FullSheet th={th}>

        />
        <div style={{display:"flex",gap:8,marginBottom:24}}>
          {[["expense","Dépense"],["income","Revenu"]].map(([v,l])=>(<button key={v} onClick={()=>handleTypeChange(v)} style={{flex:1,padding:"11px 0",fontSize:14,borderRadius:12,border:"none",cursor:"pointer",fontWeight:500,background:formMod.form.type===v?(v==="income"?(isDark?"rgba(16,185,129,0.15)":"#ecfdf5"):(isDark?"rgba(239,68,68,0.12)":"#fff5f5")):th.surface,color:formMod.form.type===v?(v==="income"?"#059669":"#ef4444"):th.muted}}>{l}</button>))}
        </div>
        {formMod.editScope&&<div style={{background:th.surface,borderRadius:10,padding:"8px 12px",marginBottom:16}}><p style={{fontSize:11,color:th.muted,margin:0}}>{{this:"Cette occurrence seulement",follow:"Cette occurrence et les suivantes"}[formMod.editScope]||""}</p></div>}
        <div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div><label style={lbl}>Description</label><input type="text" value={formMod.form.desc} onChange={e=>setFF("desc")(e.target.value)} style={{...iSt,fontSize:16}}/></div>
          <div><label style={lbl}>Montant</label><input type="number" value={formMod.form.amt} step="0.01" placeholder="0.00" onChange={e=>setFF("amt")(e.target.value)} style={{...iSt,fontSize:22,fontWeight:600,fontVariantNumeric:"tabular-nums"}}/></div>
          <div><label style={lbl}>Date de début</label><input type="date" value={formMod.form.date} onChange={e=>handleDateChange(e.target.value)} style={iSt}/></div>
          <CategoryPicker value={formMod.form.cat} onChange={handleCatChange} th={th} allCats={allCats} getCatName={getCatName}/>
          <SubCategoryPicker category={formMod.form.cat} value={formMod.form.subCat} onChange={v=>setFF("subCat")(v)} th={th} allSubcats={allSubcats}/>
          {!formMod.editScope&&<RecurrencePicker value={formMod.form.rec} onChange={v=>setFF("rec")(v)} startDate={formMod.form.date} th={th}/>}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"16px 24px",background:th.sheetBg,borderTop:"1px solid "+th.border,display:"flex",gap:10,zIndex:201,maxWidth:640,margin:"0 auto"}}>
          <button onClick={()=>setFormMod(null)} style={{flex:1,padding:"13px 0",fontSize:14,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>Annuler</button>
          <button onClick={saveForm} style={{flex:3,padding:"13px 0",fontSize:14,border:"none",borderRadius:12,background:th.btnBg,color:th.btnText,cursor:"pointer",fontWeight:600}}>{formMod.tx?"Enregistrer":"Ajouter"}</button>
        </div>
      </FullSheet>)}

      {catsMod&&(<FullSheet th={th}>
        <FullSheetHead title="Catégories & sous-catégories" onClose={()=>setCatsMod(false)} th={th}/>
        <div style={{marginBottom:24}}><SegCtrl options={[["cats","Catégories"],["subcats","Sous-catégories"]]} value={catsTab} onChange={setCatsTab} th={th}/></div>

        {catsTab==="cats"&&(<div>
          <p style={{...lbl,marginBottom:12}}>Intégrées</p>
          <div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,overflow:"hidden",marginBottom:20}}>
            {CATS.map((cat,i)=>(<div key={cat.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<CATS.length-1?"1px solid "+th.border:"none"}}>
              <div style={{width:32,height:32,borderRadius:8,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{cat.emoji}</div>
              <span style={{flex:1,fontSize:13,color:th.text}}>{getCatName(cat.id)}</span>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:th.surface,color:th.muted}}>Intégrée</span>
            </div>))}
          </div>
          <p style={{...lbl,marginBottom:12}}>Personnalisées</p>
          {customCats.length===0&&!addCatForm&&<p style={{fontSize:13,color:th.muted,textAlign:"center",padding:"20px 0",marginBottom:12}}>Aucune catégorie personnalisée</p>}
          {customCats.length>0&&(<div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,overflow:"hidden",marginBottom:12}}>
            {customCats.map((cat,i)=>(<div key={cat.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderBottom:i<customCats.length-1?"1px solid "+th.border:"none"}}>
              <div style={{width:32,height:32,borderRadius:8,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{cat.emoji}</div>
              <span style={{flex:1,fontSize:13,color:th.text}}>{cat.label}</span>
              <button onClick={()=>deleteCustomCat(cat.id)} style={{fontSize:12,color:th.danger,background:"none",border:"none",cursor:"pointer",padding:"4px 8px",borderRadius:6}}>✕</button>
            </div>))}
          </div>)}
          {addCatForm?(
            <div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,padding:"16px",marginBottom:12}}>
              <p style={{...lbl,marginBottom:12}}>Nouvelle catégorie</p>
              <div style={{display:"flex",gap:10,alignItems:"flex-end",marginBottom:14}}>
                <div style={{flex:1}}><label style={{...lbl,display:"block",marginBottom:6}}>Nom</label><input type="text" value={addCatForm.label||""} onChange={e=>setAddCatForm(f=>({...f,label:e.target.value}))} placeholder="Nom de la catégorie" style={{display:"block",width:"100%",padding:"8px 0",fontSize:14,color:th.text,background:"transparent",border:"none",borderBottom:"1px solid "+th.inputBorder,outline:"none"}}/></div>
                <div><label style={{...lbl,display:"block",marginBottom:6}}>Emoji</label><input type="text" value={addCatForm.emoji||""} onChange={e=>setAddCatForm(f=>({...f,emoji:e.target.value}))} placeholder="📦" style={{width:48,textAlign:"center",padding:"8px 4px",fontSize:18,color:th.text,background:"transparent",border:"none",borderBottom:"1px solid "+th.inputBorder,outline:"none"}}/></div>
              </div>
              <label style={{...lbl,display:"block",marginBottom:8}}>Couleur</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                {PRESET_COLORS.map(c=>(<button key={c} onClick={()=>setAddCatForm(f=>({...f,color:c}))} style={{width:28,height:28,borderRadius:"50%",background:c,border:(addCatForm.color||"#6366f1")===c?"3px solid "+th.text:"3px solid transparent",cursor:"pointer"}}/>))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setAddCatForm(null)} style={{flex:1,padding:"10px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.sub,cursor:"pointer"}}>Annuler</button>
                <button onClick={addCustomCat} disabled={!addCatForm.label?.trim()} style={{flex:2,padding:"10px 0",fontSize:13,border:"none",borderRadius:10,background:addCatForm.label?.trim()?th.btnBg:th.surface,color:addCatForm.label?.trim()?th.btnText:th.muted,cursor:addCatForm.label?.trim()?"pointer":"default",fontWeight:500}}>Ajouter</button>
              </div>
            </div>
          ):(
            <button onClick={()=>setAddCatForm({label:"",emoji:"📦",color:"#6366f1"})} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"12px 0",fontSize:13,border:"1px dashed "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer",marginBottom:8}}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> Ajouter une catégorie
            </button>
          )}
        </div>)}

        {catsTab==="subcats"&&(<div>
          <label style={{...lbl,display:"block",marginBottom:8}}>Catégorie</label>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:20}}>
            {allCats.filter(c=>c.id!=="income").map(cat=>(
              <button key={cat.id} onClick={()=>setCatFilter(cat.id)} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:20,fontSize:12,border:"1.5px solid "+(catFilter===cat.id?cat.color:th.border),background:catFilter===cat.id?cat.color+"18":"none",color:catFilter===cat.id?cat.color:th.sub,cursor:"pointer",fontWeight:catFilter===cat.id?600:400}}>
                <span>{cat.emoji}</span><span>{getCatName(cat.id)}</span>
              </button>
            ))}
          </div>
          {(()=>{
            const visible=allSubcats.filter(sc=>sc.category===catFilter);
            return(<div>
              {visible.length>0&&(<div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,overflow:"hidden",marginBottom:12}}>
                {visible.map((sc,i)=>{
                  const isBuiltin=SUBCATS.some(s=>s.id===sc.id);
                  const hasOverride=isBuiltin&&subcatGroupOverrides[sc.id]!==undefined;
                  return(<div key={sc.id} style={{padding:"12px 14px",borderBottom:i<visible.length-1?"1px solid "+th.border:"none"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:sc.group!==null?8:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:13,color:th.text,fontWeight:500}}>{sc.label}</span>
                        {isBuiltin?<span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:th.surface,color:th.muted}}>Intégrée</span>:<span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:"#6366f118",color:"#6366f1"}}>Perso.</span>}
                      </div>
                      {!isBuiltin&&<button onClick={()=>deleteCustomSubcat(sc.id)} style={{fontSize:12,color:th.danger,background:"none",border:"none",cursor:"pointer",padding:"2px 6px",borderRadius:6}}>✕</button>}
                    </div>
                    {sc.group!==null&&(<div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      {SUBCAT_GROUPS.map(g=>(<button key={g.id} onClick={()=>setSubcatGroup(sc.id,g.id)} style={{padding:"4px 10px",borderRadius:20,fontSize:11,border:"1.5px solid "+(sc.group===g.id?g.color:th.border),background:sc.group===g.id?g.color+"18":"none",color:sc.group===g.id?g.color:th.muted,cursor:"pointer",fontWeight:sc.group===g.id?600:400}}>{g.label}</button>))}
                      {hasOverride&&<button onClick={()=>resetSubcatGroup(sc.id)} style={{padding:"4px 10px",borderRadius:20,fontSize:11,border:"1px dashed "+th.border,background:"none",color:th.muted,cursor:"pointer"}}>↺ Réinitialiser</button>}
                    </div>)}
                  </div>);
                })}
              </div>)}
              {addSubcatForm&&addSubcatForm.cat===catFilter?(
                <div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,padding:"16px",marginBottom:12}}>
                  <p style={{...lbl,marginBottom:12}}>Nouvelle sous-catégorie</p>
                  <div style={{marginBottom:14}}><label style={{...lbl,display:"block",marginBottom:6}}>Nom</label><input type="text" value={addSubcatForm.label||""} onChange={e=>setAddSubcatForm(f=>({...f,label:e.target.value}))} placeholder="Nom de la sous-catégorie" style={{display:"block",width:"100%",padding:"8px 0",fontSize:14,color:th.text,background:"transparent",border:"none",borderBottom:"1px solid "+th.inputBorder,outline:"none"}}/></div>
                  <div style={{marginBottom:14}}>
                    <label style={{...lbl,display:"block",marginBottom:8}}>Groupe</label>
                    <div style={{display:"flex",gap:6}}>{SUBCAT_GROUPS.map(g=>(<button key={g.id} onClick={()=>setAddSubcatForm(f=>({...f,group:g.id}))} style={{flex:1,padding:"7px 0",borderRadius:10,fontSize:12,border:"1.5px solid "+(addSubcatForm.group===g.id?g.color:th.border),background:addSubcatForm.group===g.id?g.color+"18":"none",color:addSubcatForm.group===g.id?g.color:th.muted,cursor:"pointer",fontWeight:addSubcatForm.group===g.id?600:400}}>{g.label}</button>))}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setAddSubcatForm(null)} style={{flex:1,padding:"10px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.sub,cursor:"pointer"}}>Annuler</button>
                    <button onClick={addCustomSubcat} disabled={!addSubcatForm.label?.trim()} style={{flex:2,padding:"10px 0",fontSize:13,border:"none",borderRadius:10,background:addSubcatForm.label?.trim()?th.btnBg:th.surface,color:addSubcatForm.label?.trim()?th.btnText:th.muted,cursor:addSubcatForm.label?.trim()?"pointer":"default",fontWeight:500}}>Ajouter</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>setAddSubcatForm({label:"",cat:catFilter,group:"flexible"})} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"12px 0",fontSize:13,border:"1px dashed "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer",marginBottom:8}}>
                  <span style={{fontSize:16,lineHeight:1}}>+</span> Ajouter une sous-catégorie
                </button>
              )}
            </div>);
          })()}
        </div>)}
      </FullSheet>)}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
