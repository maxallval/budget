function relTimeStr(lastSync,t){
  if(!lastSync)return t.syncNever;
  const secs=Math.floor((Date.now()-lastSync.getTime())/1000);
  if(secs<15)return t.syncJustNow;
  if(secs<60)return t.syncAgo(secs,t.syncSec(secs));
  const mins=Math.floor(secs/60);
  if(mins<60)return t.syncAgo(mins,t.syncMin(mins));
  const hrs=Math.floor(mins/60);
  return t.syncAgo(hrs,t.syncHr(hrs));
}

const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const dayBef=s=>{const d=parseD(s);d.setDate(d.getDate()-1);return dStr(d);};
function getNthWD(date){let c=0;const d=new Date(date.getFullYear(),date.getMonth(),1);while(d<=date){if(d.getDay()===date.getDay())c++;d.setDate(d.getDate()+1);}return c;}
function normRec(rec,s){if(rec&&typeof rec==="object")return rec;const wd=s instanceof Date?s.getDay():parseD(String(s||"2024-01-01")).getDay();return({once:{type:"once"},daily:{type:"daily"},weekly:{type:"weekly",weekday:wd},monthly:{type:"monthly_day"},annual:{type:"annually"}})[rec]||{type:"once"};}
function recLabel(tx,t){const s=parseD(tx.startDate);const r=normRec(tx.recurrence,s);const wd=r.weekday!==undefined?r.weekday:s.getDay();switch(r.type){case"once":return t.recOnce;case"daily":return t.recDaily;case"weekly":return`${t.recWeeklyPre} ${t.days[wd]}`;case"monthly_day":return t.recMonthlyDay;case"monthly_nth_weekday":return`${t.recMonthlyPre} ${t.nth[r.nth]||r.nth} ${t.days[r.weekday]}`;case"annually":return`${t.recAnnuallyPre} ${s.getDate()} ${t.months[s.getMonth()]}`;case"weekdays":return t.recWeekdays;case"custom":{const{interval:iv=1,unit:u="week",weekdays:wds=[]}=r;const ul=t.recUnits.find(x=>x.v===u)?.l||u;let lb=`${t.recEvery} ${iv>1?iv+" ":""}${ul}`;if(u==="week"&&wds.length>0)lb+=" · "+wds.map(w=>t.daysS[w]).join(" ");return lb;}default:return t.recOnce;}}
function occsInMonth(tx,yr,mo){const ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0);const s=parseD(tx.startDate),e=tx.endDate?parseD(tx.endDate):null;const ex=new Set(tx.exceptions||[]);const r=normRec(tx.recurrence,s);if(s>me||(e&&e<ms))return[];const ok=d=>d>=ms&&d<=me&&d>=s&&(!e||d<=e)&&!ex.has(dStr(d));const snap=d=>new Date(d.getTime());if(r.type==="once")return ok(s)?[s.getDate()]:[];if(r.type==="daily"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}if(r.type==="weekly"){const twd=r.weekday!==undefined?r.weekday:s.getDay();const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const res=[];const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+7);}return res;}if(r.type==="monthly_day"){const day=s.getDate();if(day>me.getDate())return[];const d=new Date(yr,mo,day);return ok(d)?[day]:[];}if(r.type==="monthly_nth_weekday"){const{nth,weekday:wd2}=r;let c=0;for(let dy=1;dy<=me.getDate();dy++){const d=new Date(yr,mo,dy);if(d.getDay()===wd2){c++;if(c===nth)return ok(d)?[dy]:[];}}return[];}if(r.type==="annually"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];const d=new Date(yr,mo,s.getDate());return ok(d)?[s.getDate()]:[];}if(r.type==="weekdays"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){const w=d.getDay();if(w>0&&w<6&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}if(r.type==="custom"){const{interval:iv=1,unit:u="day",weekdays:wds=[]}=r;const res=[];if(u==="day"){const d=new Date(s>ms?s:ms);while(d<=me){if(Math.round((d-s)/86400000)%iv===0&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}}else if(u==="week"){const wdSet=new Set(wds.length>0?wds:[s.getDay()]);wdSet.forEach(twd=>{const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+iv*7);}});res.sort((a,b)=>a-b);}else if(u==="month"){const sm=s.getMonth()+s.getFullYear()*12,cm=mo+yr*12;if((cm-sm)<0||(cm-sm)%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}else if(u==="year"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];if((yr-s.getFullYear())%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}return res;}return[];}
function countOccs(tx,upTo){const s=parseD(tx.startDate);if(s>upTo)return 0;let count=0,y=s.getFullYear(),m=s.getMonth();const ey=upTo.getFullYear(),em=upTo.getMonth();let its=0;while((y<ey||(y===ey&&m<=em))&&its++<1200){const ocs=occsInMonth(tx,y,m);for(const d of ocs)if(new Date(y,m,d)<=upTo)count++;m++;if(m>11){m=0;y++;}}return count;}
const balAt=(txs,init,date)=>txs.reduce((b,tx)=>b+(tx.type==="income"?1:-1)*tx.amount*countOccs(tx,date),init);

function cleanTxs(txs){
  return txs.filter(tx=>{
    const r=normRec(tx.recurrence,parseD(tx.startDate));
    if(r.type==="once"){const ex=new Set(tx.exceptions||[]);if(ex.has(tx.startDate))return false;}
    return true;
  });
}

function LineChart({data,color,th,height=120}){
  if(!data||data.length<2)return null;
  const W=560,H=height,pad={t:12,b:28,l:44,r:12};
  const vals=data.map(d=>d.y);const mn=Math.min(...vals),mx=Math.max(...vals);const rng=mx-mn||1;
  const px=i=>pad.l+(i/(data.length-1))*(W-pad.l-pad.r);
  const py=v=>pad.t+(1-(v-mn)/rng)*(H-pad.t-pad.b);
  const pts=data.map((d,i)=>({x:px(i),y:py(d.y),label:d.label}));
  const pathD="M"+pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join("L");
  const areaD=pathD+`L${pts[pts.length-1].x.toFixed(1)},${(H-pad.b).toFixed(1)}L${pts[0].x.toFixed(1)},${(H-pad.b).toFixed(1)}Z`;
  const gradId="lg_"+color.replace("#","");
  const yTicks=[mn,mn+rng/2,mx];
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block",overflow:"visible"}}>
      <defs><linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0.01"/></linearGradient></defs>
      {yTicks.map((v,i)=><line key={i} x1={pad.l} x2={W-pad.r} y1={py(v)} y2={py(v)} stroke={th.border} strokeWidth="1"/>)}
      <path d={areaD} fill={`url(#${gradId})`}/><path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke={th.sheetBg} strokeWidth="1.5"/>)}
      {pts.filter((_,i)=>i%2===0||data.length<=7).map((p,i)=>(<text key={i} x={p.x} y={H-6} textAnchor="middle" fontSize="9" fill={th.muted}>{p.label}</text>))}
      {yTicks.map((v,i)=>(<text key={i} x={pad.l-4} y={py(v)+3.5} textAnchor="end" fontSize="9" fill={th.muted}>{v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0)}</text>))}
    </svg>
  );
}

function BarChart2({data,th,height=140}){
  if(!data||data.length===0)return null;
  const W=560,H=height,pad={t:8,b:28,l:4,r:4};
  const maxV=Math.max(...data.map(d=>Math.max(d.inc,d.exp)),1);
  const slotW=(W-pad.l-pad.r)/data.length;
  const barW=slotW*0.7,gap=slotW*0.15;
  const bh=v=>((v/maxV)*(H-pad.t-pad.b));
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block",overflow:"visible"}}>
      {data.map((d,i)=>{const x=pad.l+i*slotW+gap;const incH=bh(d.inc),expH=bh(d.exp);const bw=barW/2-1;return(<g key={i}><rect x={x} y={H-pad.b-incH} width={bw} height={Math.max(incH,1)} rx="2" fill="#10b981" opacity="0.85"/><rect x={x+bw+2} y={H-pad.b-expH} width={bw} height={Math.max(expH,1)} rx="2" fill="#ef4444" opacity="0.75"/>{(i%2===0||data.length<=7)&&<text x={x+bw} y={H-6} textAnchor="middle" fontSize="9" fill={th.muted}>{d.label}</text>}</g>);})}
      <line x1={pad.l} x2={W-pad.r} y1={H-pad.b} y2={H-pad.b} stroke={th.border} strokeWidth="1"/>
    </svg>
  );
}

async function doPushToGitHub(json,token,gistId){
  const body={files:{"budget.json":{content:json}}};
  const url=gistId?`https://api.github.com/gists/${gistId}`:"https://api.github.com/gists";
  const method=gistId?"PATCH":"POST";
  const res=await fetch(url,{method,headers:{"Authorization":"token "+token,"Content-Type":"application/json"},body:JSON.stringify(gistId?body:{...body,description:"Budget App Data",public:false})});
  if(!res.ok){let msg="HTTP "+res.status;try{const d=await res.json();msg=d.message||msg;}catch(e){}throw new Error(msg);}
  return res.json();
}

  const processQueue=async()=>{
    if(isSyncingRef.current||!navigator.onLine)return;
    if(syncQueueRef.current.length===0)return;
    isSyncingRef.current=true;setIsSyncing(true);
    const item=syncQueueRef.current[0];

      if(result.id){if(result.id!==ghGistId)setGhGistId(result.id);await window.storage.set("bgt9-updated",String(item.ts));}

      if(syncQueueRef.current.length>0)setTimeout(()=>processQueueRef.current?.(),500);

      if(item.retries<=5){const delay=Math.min(2000*Math.pow(2,item.retries-1),32000);retryTimerRef.current=setTimeout(()=>processQueueRef.current?.(),delay);}
      else{syncQueueRef.current.shift();setIsSyncing(false);}

  };

      {formMod&&(
        <FullSheet onClose={()=>setFormMod(null)} th={th}>
          <FullSheetHead title={formMod.tx?t.editTx:t.newTx} onClose={()=>setFormMod(null)} th={th}
            right={formMod.tx&&!formMod.editScope?<button onClick={()=>{setDelMod({tx:formMod.tx,dateStr:formMod.tx.startDate});setFormMod(null);}} style={{fontSize:13,color:"#f87171",background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>{t.delBtn}</button>:null}
          />
          <div style={{display:"flex",gap:8,marginBottom:24}}>
            {[["expense",t.expenseLbl],["income",t.incomeLbl]].map(([v,l])=>(
              <button key={v} onClick={()=>handleTypeChange(v)} style={{flex:1,padding:"11px 0",fontSize:14,borderRadius:12,border:"none",cursor:"pointer",fontWeight:500,transition:"all 0.15s",background:formMod.form.type===v?(v==="income"?(isDark?"rgba(16,185,129,0.15)":"#ecfdf5"):(isDark?"rgba(239,68,68,0.12)":"#fff5f5")):th.surface,color:formMod.form.type===v?(v==="income"?"#059669":"#ef4444"):th.muted}}>{l}</button>
            ))}
          </div>
          {formMod.editScope&&<div style={{background:th.surface,borderRadius:10,padding:"8px 12px",marginBottom:16}}><p style={{fontSize:11,color:th.muted,margin:0}}>{{this:"Cette occurrence seulement",follow:"Cette occurrence et les suivantes"}[formMod.editScope]||""}</p></div>}
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div><label style={lbl}>{t.descLbl}</label><input type="text" value={formMod.form.desc} onChange={e=>setFF("desc")(e.target.value)} style={{...iSt,fontSize:16}}/></div>
            <div><label style={lbl}>{t.amtLbl}</label><input type="number" value={formMod.form.amt} step="0.01" placeholder="0.00" onChange={e=>setFF("amt")(e.target.value)} style={{...iSt,fontSize:22,fontWeight:600,fontVariantNumeric:"tabular-nums"}}/></div>
            <div><label style={lbl}>{t.startLbl}</label><input type="date" value={formMod.form.date} onChange={e=>handleDateChange(e.target.value)} style={iSt}/></div>
            <CategoryPicker value={formMod.form.cat} onChange={handleCatChange} th={th} t={t}/>
            <SubCategoryPicker category={formMod.form.cat} value={formMod.form.subCat} onChange={v=>setFF("subCat")(v)} th={th} t={t}/>
            {!formMod.editScope&&<RecurrencePicker value={formMod.form.rec} onChange={v=>setFF("rec")(v)} startDate={formMod.form.date} t={t} th={th}/>}
          </div>
          <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"16px 24px",background:th.sheetBg,borderTop:"1px solid "+th.border,display:"flex",gap:10,zIndex:201,maxWidth:640,margin:"0 auto"}}>
            <button onClick={()=>setFormMod(null)} style={{flex:1,padding:"13px 0",fontSize:14,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button>
            <button onClick={saveForm} style={{flex:3,padding:"13px 0",fontSize:14,border:"none",borderRadius:12,background:th.btnBg,color:th.btnText,cursor:"pointer",fontWeight:600}}>{formMod.tx?t.save:t.add}</button>
          </div>
        </FullSheet>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
