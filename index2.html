(function injectManifest(){
  const ico=(s,r)=>`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${s} ${s}'><rect width='${s}' height='${s}' rx='${r}' fill='%23111'/><text x='${s/2}' y='${Math.round(s*.74)}' font-size='${Math.round(s*.56)}' text-anchor='middle'>%F0%9F%92%B0</text></svg>`;
  const m={name:"Budget – Gestion financière",short_name:"Budget",start_url:"./",scope:"./",display:"standalone",orientation:"portrait",background_color:"#111111",theme_color:"#111111",lang:"fr",icons:[{src:ico(192,40),sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"},{src:ico(512,96),sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  try{const b=new Blob([JSON.stringify(m)],{type:"application/manifest+json"});document.querySelector("#pwa-manifest")?.remove();const l=document.createElement("link");l.id="pwa-manifest";l.rel="manifest";l.href=URL.createObjectURL(b);document.head.appendChild(l);}catch(e){}
})();
(function registerSW(){
  if(!('serviceWorker' in navigator))return;
  const sw=`const CACHE='budget-v0024';const CDN=['https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'];self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(CDN)).then(()=>self.skipWaiting()).catch(()=>self.skipWaiting()));});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});self.addEventListener('fetch',e=>{if(e.request.method!=='GET'||!e.request.url.includes('cdnjs'))return;e.respondWith(caches.match(e.request).then(c=>{if(c)return c;return fetch(e.request).then(r=>{if(r.ok)caches.open(CACHE).then(ch=>ch.put(e.request,r.clone()));return r;}).catch(()=>c);}));});`;
  try{const b=new Blob([sw],{type:"application/javascript"});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}catch(e){}
})();

function relTimeStr(lastSync,t){if(!lastSync)return t.syncNever;const secs=Math.floor((Date.now()-lastSync.getTime())/1000);if(secs<15)return t.syncJustNow;if(secs<60)return t.syncAgo(secs,t.syncSec(secs));const mins=Math.floor(secs/60);if(mins<60)return t.syncAgo(mins,t.syncMin(mins));const hrs=Math.floor(mins/60);return t.syncAgo(hrs,t.syncHr(hrs));}

const mkTh=d=>d?{bg:"#0d0d0d",bgSub:"#161616",surface:"#1c1c1c",border:"#252525",inputBorder:"#333",text:"#f0f0f0",sub:"#888",muted:"#444",btnBg:"#efefef",btnText:"#111",togOff:"#3a3a3a",sheetBg:"#161616",danger:"#f87171",cardBg:"#181818"}:{bg:"#fff",bgSub:"#f9fafb",surface:"#f3f4f6",border:"#f0f0f0",inputBorder:"#e5e7eb",text:"#111",sub:"#6b7280",muted:"#9ca3af",btnBg:"#111",btnText:"#fff",togOff:"#d1d5db",sheetBg:"#fff",danger:"#ef4444",cardBg:"#fafafa"};
const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

function normRec(rec,s){if(rec&&typeof rec==="object")return rec;const wd=s instanceof Date?s.getDay():parseD(String(s||"2024-01-01")).getDay();return({once:{type:"once"},daily:{type:"daily"},weekly:{type:"weekly",weekday:wd},monthly:{type:"monthly_day"},annual:{type:"annually"}})[rec]||{type:"once"};}

const App=()=>{
  const[data,setData]=useState(null);
  const[syncStatus,setSyncStatus]=useState("idle");
  const[lastSync,setLastSync]=useState(null);
  const isSyncingRef=useRef(false);
  const queueRef=useRef([]);

  useEffect(()=>{
    (async()=>{
      const stored=await window.storage.get("budget_data");
      let d=stored?JSON.parse(stored.value):{txs:[],settings:{lang:detectLang(),currency:"cad",darkMode:"auto",initBal:0}};
      setData(d);
      if(d.settings?.ghToken && d.settings?.ghGistId && d.settings?.ghLoadOnStart){
        pullFromGithub(d.settings.ghToken, d.settings.ghGistId);
      }
    })();
  },[]);

  const processQueue=async()=>{
    if(isSyncingRef.current) return;
    if(queueRef.current.length===0) return;

    isSyncingRef.current=true;
    setSyncStatus("syncing");
    
    const latest=queueRef.current[queueRef.current.length-1];
    queueRef.current=[];

    try{
      const{ghToken:token,ghGistId:id}=latest.settings;
      const url=`https://api.github.com/gists/${id}`;
      
      const controller=new AbortController();
      const timeoutId=setTimeout(()=>controller.abort(),10000);

      const res=await fetch(url,{
        method:"PATCH",
        signal:controller.signal,
        headers:{
          "Authorization":"Bearer "+token, 
          "Accept":"application/vnd.github+json",
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          files:{"budget.json":{
            content:JSON.stringify({...latest, updated:Date.now()})
          }}
        })
      });
      clearTimeout(timeoutId);
      
      if(res.ok){
        setLastSync(new Date());
        setSyncStatus("idle");
      } else {
        setSyncStatus("fail");
      }
    } catch(e) {
      setSyncStatus("fail");
    } finally {
      isSyncingRef.current=false;
      if(queueRef.current.length>0) setTimeout(processQueue,5000);
    }
  };

  const pullFromGithub=async(ghToken,id)=>{
    setSyncStatus("syncing");
    try{
      const controller=new AbortController();
      const timeoutId=setTimeout(()=>controller.abort(),10000);

      const res=await fetch(`https://api.github.com/gists/${id}`,{
        signal:controller.signal,
        headers:{
          "Authorization":"Bearer "+ghToken,
          "Accept":"application/vnd.github+json"
        }
      });
      clearTimeout(timeoutId);

      if(res.ok){
        const g=await res.json();
        const content=g.files["budget.json"]?.content;
        if(content){
          const nd=JSON.parse(content);
          setData(nd);
          await window.storage.set("budget_data",JSON.stringify(nd));
          setLastSync(new Date());
          setSyncStatus("idle");
        }
      } else {
        setSyncStatus("fail");
      }
    } catch(e) {
      setSyncStatus("fail");
    }
  };

  const updateData=async(nd)=>{
    setData(nd);
    await window.storage.set("budget_data",JSON.stringify(nd));
    if(nd.settings?.ghToken && nd.settings?.ghGistId){
      queueRef.current.push(nd);
      processQueue();
    }
  };

  if(!data) return null;
  const t=TR[data.settings.lang]||TR.fr;
  const th=mkTh(data.settings.darkMode==="on"||(data.settings.darkMode==="auto"&&window.matchMedia("(prefers-color-scheme:dark)").matches));

  return (
    <div style={{minHeight:"100vh",background:th.bg,color:th.text,paddingBottom:80}}>
      {/* Barre de Status Sync */}
      <div style={{padding:12,fontSize:11,background:th.surface,display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+th.border}}>
         <span style={{color:syncStatus==="fail"?th.danger:th.sub}}>
           {syncStatus==="syncing" ? t.syncing : (syncStatus==="fail" ? t.syncFail : relTimeStr(lastSync,t))}
         </span>
         <div style={{width:8,height:8,borderRadius:"50%",background:syncStatus==="syncing"?"#3b82f6":syncStatus==="fail"?th.danger:"#10b981"}}></div>
      </div>

      <div style={{padding:20}}>
        <h1 style={{fontSize:28,fontWeight:800,marginBottom:4}}>{t.title}</h1>
        <p style={{color:th.sub,fontSize:14,marginBottom:24}}>{t.sub}</p>

        {/* Section Simple pour tester */}
        <div style={{background:th.surface,padding:20,borderRadius:16,border:"1px solid "+th.border}}>
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:12,color:th.sub,marginBottom:4}}>{t.langLbl}</label>
            <select 
              value={data.settings.lang} 
              onChange={e=>updateData({...data, settings:{...data.settings, lang:e.target.value}})}
              style={{width:"100%",padding:12,borderRadius:8,background:th.bg,color:th.text,border:"1px solid "+th.inputBorder}}
            >
              {LANG_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          </div>
          
          <button 
             onClick={()=>pullFromGithub(data.settings.ghToken, data.settings.ghGistId)}
             style={{width:"100%",padding:14,borderRadius:12,background:th.btnBg,color:th.btnText,border:"none",fontWeight:600}}
          >
            {t.ghRestoreBtn}
          </button>
        </div>
      </div>

      {/* Navigation Bas */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,height:70,background:th.sheetBg,borderTop:"1px solid "+th.border,display:"flex",justifyContent:"space-around",alignItems:"center",zIndex:100}}>
          <div style={{textAlign:"center",color:th.sub,fontSize:10}}>{t.navHome}</div>
          <div style={{textAlign:"center",color:th.sub,fontSize:10}}>{t.navTx}</div>
          <div style={{textAlign:"center",color:th.sub,fontSize:10}}>{t.navSettings}</div>
      </div>
    </div>
  );
};

root.render(<App/>);
</script>
