const _pdCache=new Map();
const _pdCacheMaxSize=500;
const parseD=s=>{
  if(!s)return new Date(NaN);
  let v=_pdCache.get(s);
  if(!v){
    if(_pdCache.size>=_pdCacheMaxSize)_pdCache.delete(_pdCache.keys().next().value);
    const[y,m,d]=s.split("-").map(Number);v=[y,m-1,d];_pdCache.set(s,v);
  }
  return new Date(v[0],v[1],v[2]);
};
const dayBef=s=>{const[y,m,d]=s.split("-").map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()-1);return dStr(dt);};
const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const addMths=(yr,mo,n)=>{let m=mo+n,y=yr;while(m>11){m-=12;y++;}while(m<0){m+=12;y--;}return{yr:y,mo:m};};
const fA=(n,full=false,dec=true)=>{
  const a=Math.abs(n);

    ?(full?a.toLocaleString("fr-CA",{minimumFractionDigits:2,maximumFractionDigits:2}):a>=10000?(a/1000).toFixed(1)+"k":a>=1000?(a/1000).toFixed(2)+"k":a.toFixed(2))
    :(full?a.toLocaleString("fr-CA",{minimumFractionDigits:0,maximumFractionDigits:0}):a>=10000?(a/1000).toFixed(0)+"k":a>=1000?(a/1000).toFixed(1)+"k":Math.round(a).toString());
  return nm+" $";
};
function getNthWD(date){let c=0;const d=new Date(date.getFullYear(),date.getMonth(),1);while(d<=date){if(d.getDay()===date.getDay())c++;d.setDate(d.getDate()+1);}return c;}
function normRec(rec,s){if(rec&&typeof rec==="object")return rec;const wd=s instanceof Date?s.getDay():parseD(String(s||"2024-01-01")).getDay();return({once:{type:"once"},daily:{type:"daily"},weekly:{type:"weekly",weekday:wd},monthly:{type:"monthly_day"},annual:{type:"annually"}})[rec]||{type:"once"};}
function occsInMonth(tx,yr,mo){
  const ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0);
  const s=parseD(tx.startDate),e=tx.endDate?parseD(tx.endDate):null;
  const ex=new Set(tx.exceptions||[]),r=normRec(tx.recurrence,s);
  if(s>me||(e&&e<ms))return[];
  const ok=d=>d>=ms&&d<=me&&d>=s&&(!e||d<=e)&&!ex.has(dStr(d));
  const snap=d=>new Date(d.getTime());
  if(r.type==="once")return ok(s)?[s.getDate()]:[];
  if(r.type==="daily"){const res=[],d=new Date(s>ms?s:ms);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="weekly"){const twd=r.weekday!==undefined?r.weekday:s.getDay(),a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const res=[],d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+7);}return res;}
  if(r.type==="monthly_day"){const day=s.getDate();if(day>me.getDate())return[];const d=new Date(yr,mo,day);return ok(d)?[day]:[];}
  if(r.type==="monthly_nth_weekday"){const{nth,weekday:wd2}=r;let c=0;for(let dy=1;dy<=me.getDate();dy++){const d=new Date(yr,mo,dy);if(d.getDay()===wd2){c++;if(c===nth)return ok(d)?[dy]:[];}}return[];}
  if(r.type==="annually"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];const d=new Date(yr,mo,s.getDate());return ok(d)?[s.getDate()]:[];}
  if(r.type==="weekdays"){const res=[],d=new Date(s>ms?s:ms);while(d<=me){const w=d.getDay();if(w>0&&w<6&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="custom"){
    const{interval:iv=1,unit:u="day",weekdays:wds=[]}=r,res=[];
    if(u==="day"){const d=new Date(s>ms?s:ms);while(d<=me){if(Math.round((d-s)/86400000)%iv===0&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}}
    else if(u==="week"){const wdSet=new Set(wds.length>0?wds:[s.getDay()]);wdSet.forEach(twd=>{const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+iv*7);}});res.sort((a,b)=>a-b);}
    else if(u==="month"){const sm=s.getMonth()+s.getFullYear()*12,cm=mo+yr*12;if((cm-sm)<0||(cm-sm)%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    else if(u==="year"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];if((yr-s.getFullYear())%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    return res;
  }
  return[];
}
function countOccs(tx,upTo){
  const s=parseD(tx.startDate);if(s>upTo)return 0;
  let count=0,y=s.getFullYear(),m=s.getMonth(),its=0;
  const ey=upTo.getFullYear(),em=upTo.getMonth();
  while((y<ey||(y===ey&&m<=em))&&its++<1200){for(const d of occsInMonth(tx,y,m))if(new Date(y,m,d)<=upTo)count++;m++;if(m>11){m=0;y++;}}
  return count;
}

function relTimeStr(ls){
  if(!ls)return"Jamais synchronisé";
  const s=Math.floor((Date.now()-ls.getTime())/1000);
  if(s<15)return"Synchronisé à l'instant";
  if(s<60)return"Synchronisé il y a "+s+"s";
  const m=Math.floor(s/60);if(m<60)return"Synchronisé il y a "+m+"min";
  const h=Math.floor(m/60);return"Synchronisé il y a "+h+"h";
}
function recLabel(tx){
  const s=parseD(tx.startDate),r=normRec(tx.recurrence,s),wd=r.weekday!==undefined?r.weekday:s.getDay();
  switch(r.type){
    case"once":return"Une fois";case"daily":return"Tous les jours";
    case"weekly":return"Toutes les semaines le "+DAYS_FR[wd];
    case"monthly_day":return"Tous les mois";
    case"monthly_nth_weekday":return"Tous les mois, le "+(NTH_FR[r.nth]||r.nth)+" "+DAYS_FR[r.weekday];
    case"annually":return"Annuellement le "+s.getDate()+" "+MONTHS_FR[s.getMonth()];
    case"weekdays":return"Jours de semaine (lun.-ven.)";
    case"custom":{const{interval:iv=1,unit:u="week",weekdays:wds=[]}=r;let lb="Se répète tous les "+(iv>1?iv+" ":"")+(UNITS_FR[u]||u);if(u==="week"&&wds.length>0)lb+=" - "+wds.map(w=>DS_FR[w]).join(" ");return lb;}
    default:return"Une fois";
  }
}

function LineChart({data,color,th,height=120}){
  if(!data||data.length<2)return null;
  const W=560,H=height,pad={t:12,b:28,l:44,r:12};
  const vals=data.map(d=>d.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const px=i=>pad.l+(i/(data.length-1))*(W-pad.l-pad.r);
  const py=v=>pad.t+(1-(v-mn)/rng)*(H-pad.t-pad.b);
  const pts=data.map((d,i)=>({x:px(i),y:py(d.y),label:d.label}));
  const curve=pts.reduce((d,p,i)=>{
    if(i===0)return`M${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    const prev=pts[i-1],cpx=(prev.x+p.x)/2;
    return d+` C${cpx.toFixed(1)},${prev.y.toFixed(1)} ${cpx.toFixed(1)},${p.y.toFixed(1)} ${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  },"");
  const pathD=curve;
  const areaD=curve+"L"+pts[pts.length-1].x.toFixed(1)+","+(H-pad.b).toFixed(1)+"L"+pts[0].x.toFixed(1)+","+(H-pad.b).toFixed(1)+"Z";
  const gid="lg_"+color.replace("#",""),yTicks=[mn,mn+rng/2,mx];
  return(<svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height,display:"block",overflow:"visible"}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0.01"/></linearGradient></defs>
    {yTicks.map((v,i)=><line key={i} x1={pad.l} x2={W-pad.r} y1={py(v)} y2={py(v)} stroke={th.border} strokeWidth="1"/>)}
    <path d={areaD} fill={"url(#"+gid+")"}/><path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke={th.sheetBg} strokeWidth="1.5"/>)}
    {pts.filter((_,i)=>i%2===0||data.length<=7).map((p,i)=><text key={i} x={p.x} y={H-6} textAnchor="middle" fontSize="9" fill={th.muted}>{p.label}</text>)}
    {yTicks.map((v,i)=><text key={i} x={pad.l-4} y={py(v)+3.5} textAnchor="end" fontSize="9" fill={th.muted}>{v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0)}</text>)}
  </svg>);
}
function StreamChart({data,th,height=160}){
  if(!data||data.length<2)return null;
  const W=560,H=height,pad={t:20,b:20,l:4,r:4};
  const maxV=Math.max(...data.map(d=>Math.max(d.inc,d.exp)),1);
  const py=v=>pad.t+(1-v/maxV)*(H-pad.t-pad.b);
  const px=i=>pad.l+(i/(data.length-1))*(W-pad.l-pad.r);
  const pts=data.map((d,i)=>({x:px(i),yi:py(d.inc),ye:py(d.exp),label:d.label,net:d.inc-d.exp}));

  // Courbe cubic Bézier helper
  const bezier=yKey=>pts.reduce((d,p,i)=>{
    if(i===0)return`M${p.x.toFixed(1)},${p[yKey].toFixed(1)}`;
    const prev=pts[i-1],cpx=(prev.x+p.x)/2;
    return d+` C${cpx.toFixed(1)},${prev[yKey].toFixed(1)} ${cpx.toFixed(1)},${p[yKey].toFixed(1)} ${p.x.toFixed(1)},${p[yKey].toFixed(1)}`;
  },"");

  const incPath=bezier("yi");
  const expPath=bezier("ye");
  const incArea=incPath+`L${pts[pts.length-1].x},${H-pad.b} L${pts[0].x},${H-pad.b}Z`;
  const expArea=expPath+`L${pts[pts.length-1].x},${H-pad.b} L${pts[0].x},${H-pad.b}Z`;

  // Zone entre les deux courbes (épargne ou déficit)
  const revExpPath=incPath+" "+bezier("ye").replace(/^M/,"L")
    .split(" ").reverse().map((seg,i,arr)=>{
      if(i===0)return`L${pts[pts.length-1].x.toFixed(1)},${pts[pts.length-1].ye.toFixed(1)}`;
      return seg;
    }).join(" ")+"Z";

  const gid=`sc${Math.random().toString(36).slice(2,6)}`;
  return(<svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height,display:"block",overflow:"visible"}}>
    <defs>
      <linearGradient id={gid+"i"} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" stopOpacity="0.25"/><stop offset="100%" stopColor="#10b981" stopOpacity="0.03"/></linearGradient>
      <linearGradient id={gid+"e"} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f87171" stopOpacity="0.18"/><stop offset="100%" stopColor="#f87171" stopOpacity="0.03"/></linearGradient>
    </defs>

    {/* Aires remplies */}
    <path d={incArea} fill={`url(#${gid}i)`}/>
    <path d={expArea} fill={`url(#${gid}e)`}/>

    {/* Courbes principales */}
    <path d={incPath} fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    <path d={expPath} fill="none" stroke="#f87171" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="5 3"/>

    {/* Points + labels */}
    {pts.map((p,i)=>{
      const showLabel=i%2===0||data.length<=7;
      return(<g key={i}>
        <circle cx={p.x} cy={p.yi} r="3" fill="#10b981" stroke={th.sheetBg} strokeWidth="1.5"/>
        <circle cx={p.x} cy={p.ye} r="3" fill="#f87171" stroke={th.sheetBg} strokeWidth="1.5"/>
        {showLabel&&<text x={p.x} y={H-4} textAnchor="middle" fontSize="9" fill={th.muted}>{p.label}</text>}
      </g>);
    })}

    {/* Légende */}
    <line x1={pad.l} y1={8} x2={pad.l+14} y2={8} stroke="#10b981" strokeWidth="2" strokeLinecap="round"/>
    <text x={pad.l+18} y={12} fontSize="9" fill={th.muted}>Revenus</text>
    <line x1={pad.l+62} y1={8} x2={pad.l+76} y2={8} stroke="#f87171" strokeWidth="2" strokeLinecap="round" strokeDasharray="4 2"/>
    <text x={pad.l+80} y={12} fontSize="9" fill={th.muted}>Dépenses</text>
  </svg>);
}

marginBottom:12}}><p style={{...lbl,marginBottom:12}}>Nouvelle sous-catégorie</p><div style={{marginBottom:14}}><label style={{...lbl,display:"block",marginBottom:6}}>Nom</label><input type="text" value={addSubcatForm.label||""} onChange={e=>setAddSubcatForm(f=>({...f,label:e.target.value}))} placeholder="Nom de la sous-catégorie" style={{display:"block",width:"100%",padding:"8px 0",fontSize:14,color:th.text,background:"transparent",border:"none",borderBottom:"1px solid "+th.inputBorder,outline:"none"}}/></div><div style={{marginBottom:14}}><label style={{...lbl,display:"block",marginBottom:8}}>Groupe</label><div style={{display:"flex",gap:6}}>{SUBCAT_GROUPS.map(g=><button key={g.id} onClick={()=>setAddSubcatForm(f=>({...f,group:g.id}))} style={{flex:1,padding:"7px 0",borderRadius:10,fontSize:12,border:"1.5px solid "+(addSubcatForm.group===g.id?g.color:th.border),background:addSubcatForm.group===g.id?g.color+"18":"none",color:addSubcatForm.group===g.id?g.color:th.muted,cursor:"pointer",fontWeight:addSubcatForm.group===g.id?600:400}}>{g.label}</button>)}</div></div><div style={{display:"flex",gap:8}}><button onClick={()=>setAddSubcatForm(null)} style={{flex:1,padding:"10px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.sub,cursor:"pointer"}}>Annuler</button><button onClick={addCustomSubcat} disabled={!addSubcatForm.label?.trim()} style={{flex:2,padding:"10px 0",fontSize:13,border:"none",borderRadius:10,background:addSubcatForm.label?.trim()?th.btnBg:th.surface,color:addSubcatForm.label?.trim()?th.btnText:th.muted,cursor:addSubcatForm.label?.trim()?"pointer":"default",fontWeight:500}}>Ajouter</button></div></div>):(<button onClick={()=>setAddSubcatForm({label:"",cat:catFilter,group:"flexible"})} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"12px 0",fontSize:13,border:"1px dashed "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer",marginBottom:8}}><span style={{fontSize:16,lineHeight:1}}>+</span> Ajouter une sous-catégorie</button>)}</div>);})()}
            </div>):(<div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px",background:th.surface,borderRadius:10,border:"1px solid "+th.border}}><span style={{fontSize:16}}>🔒</span><p style={{fontSize:12,color:th.muted,margin:0}}>Sous-catégories réservées à la version Pro</p></div>)
          )}
        </FullSheet>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
