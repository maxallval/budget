const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const dayBef=s=>{const d=parseD(s);d.setDate(d.getDate()-1);return dStr(d);};
function getNthWD(date){let c=0;const d=new Date(date.getFullYear(),date.getMonth(),1);while(d<=date){if(d.getDay()===date.getDay())c++;d.setDate(d.getDate()+1);}return c;}
function normRec(rec,s){if(rec&&typeof rec==="object")return rec;const wd=s instanceof Date?s.getDay():parseD(String(s||"2024-01-01")).getDay();return({once:{type:"once"},daily:{type:"daily"},weekly:{type:"weekly",weekday:wd},monthly:{type:"monthly_day"},annual:{type:"annually"}})[rec]||{type:"once"};}
function recLabel(tx,t){const s=parseD(tx.startDate);const r=normRec(tx.recurrence,s);const wd=r.weekday!==undefined?r.weekday:s.getDay();switch(r.type){case"once":return t.recOnce;case"daily":return t.recDaily;case"weekly":return`${t.recWeeklyPre} ${t.days[wd]}`;case"monthly_day":return t.recMonthlyDay;case"monthly_nth_weekday":return`${t.recMonthlyPre} ${t.nth[r.nth]||r.nth} ${t.days[r.weekday]}`;case"annually":return`${t.recAnnuallyPre} ${s.getDate()} ${t.months[s.getMonth()]}`;case"weekdays":return t.recWeekdays;case"custom":{const{interval:iv=1,unit:u="week",weekdays:wds=[]}=r;const ul=t.recUnits.find(x=>x.v===u)?.l||u;let lb=`${t.recEvery} ${iv} ${ul}`;if(u==="week"&&wds.length>0)lb+=" · "+wds.map(w=>t.daysS[w]).join(" ");return lb;}default:return t.recOnce;}}
function occsInMonth(tx,yr,mo){
  const ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0);
  const s=parseD(tx.startDate),e=tx.endDate?parseD(tx.endDate):null;
  const ex=new Set(tx.exceptions||[]);const r=normRec(tx.recurrence,s);
  if(s>me||(e&&e<ms))return[];
  const ok=d=>d>=ms&&d<=me&&d>=s&&(!e||d<=e)&&!ex.has(dStr(d));
  const snap=d=>new Date(d.getTime());
  if(r.type==="once")return ok(s)?[s.getDate()]:[];
  if(r.type==="daily"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="weekly"){const twd=r.weekday!==undefined?r.weekday:s.getDay();const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const res=[];const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+7);}return res;}
  if(r.type==="monthly_day"){const day=s.getDate();if(day>me.getDate())return[];const d=new Date(yr,mo,day);return ok(d)?[day]:[];}
  if(r.type==="monthly_nth_weekday"){const{nth,weekday:wd2}=r;let c=0;for(let dy=1;dy<=me.getDate();dy++){const d=new Date(yr,mo,dy);if(d.getDay()===wd2){c++;if(c===nth)return ok(d)?[dy]:[];}}return[];}
  if(r.type==="annually"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];const d=new Date(yr,mo,s.getDate());return ok(d)?[s.getDate()]:[]; }
  if(r.type==="weekdays"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){const w=d.getDay();if(w>0&&w<6&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="custom"){const{interval:iv=1,unit:u="day",weekdays:wds=[]}=r;const res=[];
    if(u==="day"){const d=new Date(s>ms?s:ms);while(d<=me){if(Math.round((d-s)/86400000)%iv===0&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}}
    else if(u==="week"){const wdSet=new Set(wds.length>0?wds:[s.getDay()]);wdSet.forEach(twd=>{const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+iv*7);}});res.sort((a,b)=>a-b);}
    else if(u==="month"){const sm=s.getMonth()+s.getFullYear()*12,cm=mo+yr*12;if((cm-sm)<0||(cm-sm)%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    else if(u==="year"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];if((yr-s.getFullYear())%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    return res;}
  return[];
}
function countOccs(tx,upTo){const s=parseD(tx.startDate);if(s>upTo)return 0;let count=0,y=s.getFullYear(),m=s.getMonth();const ey=upTo.getFullYear(),em=upTo.getMonth();let its=0;while((y<ey||(y===ey&&m<=em))&&its++<1200){const ocs=occsInMonth(tx,y,m);for(const d of ocs)if(new Date(y,m,d)<=upTo)count++;m++;if(m>11){m=0;y++;}}return count;}
const balAt=(txs,init,date)=>txs.reduce((b,tx)=>b+(tx.type==="income"?1:-1)*tx.amount*countOccs(tx,date),init);
function fA(n,cur,full=false){const a=Math.abs(n);const nm=full?a.toLocaleString("fr-CA",{minimumFractionDigits:2,maximumFractionDigits:2}):a>=10000?(a/1000).toFixed(1)+"k":a>=1000?(a/1000).toFixed(2)+"k":a.toFixed(2);return cur==="usd"?"$"+nm:cur==="eur"?nm+" €":nm+" $";}

function RecurrencePicker({value,onChange,startDate,t,th}){
  const s=useMemo(()=>parseD(startDate),[startDate]);
  const wd=s.getDay(),nth=getNthWD(s);
  const nr=useMemo(()=>normRec(value,s),[value,s]);
  const isCust=nr.type==="custom";
  const opts=useMemo(()=>[{rec:{type:"once"},label:t.recOnce},{rec:{type:"daily"},label:t.recDaily},{rec:{type:"weekly",weekday:wd},label:`${t.recWeeklyPre} ${t.days[wd]}`},{rec:{type:"monthly_nth_weekday",nth,weekday:wd},label:`${t.recMonthlyPre} ${t.nth[nth]||nth} ${t.days[wd]}`},{rec:{type:"annually"},label:`${t.recAnnuallyPre} ${s.getDate()} ${t.months[s.getMonth()]}`},{rec:{type:"weekdays"},label:t.recWeekdays},{rec:null,isCustom:true,label:t.recCustom}],[s,wd,nth,t]);
  const selIdx=useMemo(()=>{if(isCust)return 6;return opts.findIndex(o=>{if(!o.rec)return false;if(o.rec.type!==nr.type)return false;if(o.rec.type==="weekly")return o.rec.weekday===nr.weekday;if(o.rec.type==="monthly_nth_weekday")return o.rec.nth===nr.nth&&o.rec.weekday===nr.weekday;return true;});},[nr,opts,isCust]);

        {opt.isCustom&&isCust&&(<div style={{padding:"14px 14px 16px 44px",background:th.surface,borderTop:"1px solid "+th.border}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:12,color:th.sub}}>{t.recEvery}</span><input type="number" min={1} max={99} value={nr.interval||1} onChange={e=>onChange({...nr,interval:Math.max(1,parseInt(e.target.value)||1)})} style={{width:44,textAlign:"center",fontSize:13,color:th.text,background:th.bg,border:"1px solid "+th.border,borderRadius:7,padding:"5px 4px",outline:"none"}}/><select value={nr.unit||"week"} onChange={e=>onChange({...nr,unit:e.target.value})} style={{fontSize:13,color:th.text,background:th.bg,border:"1px solid "+th.border,borderRadius:7,padding:"5px 8px",outline:"none",cursor:"pointer"}}>{t.recUnits.map(u=><option key={u.v} value={u.v}>{u.l}</option>)}</select></div>
          {(nr.unit||"week")==="week"&&(<div style={{display:"flex",gap:5,marginTop:12}}>{t.daysS.map((d,di)=>{const wds=nr.weekdays||[wd],on=wds.includes(di);return(<button key={di} onClick={()=>{let nw=on?wds.filter(x=>x!==di):[...wds,di];if(nw.length===0)nw=[di];onChange({...nr,weekdays:nw});}} style={{width:33,height:33,borderRadius:"50%",fontSize:12,fontWeight:500,background:on?th.btnBg:th.bg,color:on?th.btnText:th.sub,border:"1.5px solid "+(on?th.btnBg:th.border),cursor:"pointer",transition:"all 0.15s"}}>{d}</button>);})}</div>)}
        </div>)}

  const[mode,setMode]=useState("daily");
  const[txs,setTxs]=useState([]);
  const[initBal,setInitBal]=useState(1000);
  const[budgets,setBudgets]=useState({});
  const[loaded,setLoaded]=useState(false);
  const[lang,setLang]=useState(detectLang);
  const[cur,setCur]=useState("cad");
  const[disp,setDisp]=useState({curBal:true,endBal:false,revExp:false,net:false});
  const[darkMode,setDarkMode]=useState("off");
  const[sysDark,setSysDark]=useState(()=>window.matchMedia("(prefers-color-scheme: dark)").matches);
  // Save options
  const[saveMode,setSaveMode]=useState("local"); // "local" | "github"
  const[saveAuto,setSaveAuto]=useState(true);
  // GitHub
  const[ghToken,setGhToken]=useState("");
  const[ghGistId,setGhGistId]=useState("");
  const[ghPullOnStart,setGhPullOnStart]=useState(true);
  const[ghStatus,setGhStatus]=useState("");
  // UI
  const[dayMod,setDayMod]=useState(null);
  const[formMod,setFormMod]=useState(null);
  const[delMod,setDelMod]=useState(null);
  const[delAccMod,setDelAccMod]=useState(false);
  const[delAccInput,setDelAccInput]=useState("");
  const[expandedCatTx,setExpandedCatTx]=useState(null);
  const[exportMod,setExportMod]=useState(false);
  const[importMod,setImportMod]=useState(false);
  const[importText,setImportText]=useState("");
  const[copied,setCopied]=useState(false);
  const[saveStatus,setSaveStatus]=useState("idle");
  const[toast,setToast]=useState("");
  const saveTimer=useRef(null);
  const ghTimer=useRef(null);
  const cfgTimer=useRef(null);

  const t=TR[lang]||TR.fr;
  const isDark=darkMode==="on"||(darkMode==="auto"&&sysDark);
  const th=useMemo(()=>mkTh(isDark),[isDark]);
  const iSt={display:"block",width:"100%",marginTop:6,padding:"8px 0",fontSize:14,color:th.text,background:"transparent",border:"none",borderBottom:"1px solid "+th.inputBorder,outline:"none",boxSizing:"border-box"};
  const lbl={fontSize:10,color:th.muted,letterSpacing:"0.12em",textTransform:"uppercase"};

  useEffect(()=>{const mq=window.matchMedia("(prefers-color-scheme: dark)");const h=e=>setSysDark(e.matches);mq.addEventListener("change",h);return()=>mq.removeEventListener("change",h);},[]);

  // Chargement initial
  useEffect(()=>{(async()=>{
    try{const r=await window.storage.get("bgt9-tx");if(r)setTxs(JSON.parse(r.value));}catch(e){}
    try{const r=await window.storage.get("bgt9-bal");if(r)setInitBal(parseFloat(r.value));}catch(e){}
    try{const r=await window.storage.get("bgt9-bud");if(r)setBudgets(JSON.parse(r.value));}catch(e){}
    try{const r=await window.storage.get("bgt9-cfg");if(r){const c=JSON.parse(r.value);if(c.lang)setLang(c.lang);if(c.cur)setCur(c.cur);if(c.disp)setDisp(c.disp);if(c.darkMode)setDarkMode(c.darkMode);if(c.mode)setMode(c.mode);if(c.saveMode)setSaveMode(c.saveMode);if(c.saveAuto!==undefined)setSaveAuto(c.saveAuto);}}catch(e){}
    let ghTok="",ghGid="",ghPull=true,sMode="local";
    try{const r=await window.storage.get("bgt9-gh");if(r){const g=JSON.parse(r.value);if(g.token){setGhToken(g.token);ghTok=g.token;}if(g.gistId){setGhGistId(g.gistId);ghGid=g.gistId;}if(g.pullOnStart!==undefined){setGhPullOnStart(g.pullOnStart);ghPull=g.pullOnStart;}}}catch(e){}
    try{const r=await window.storage.get("bgt9-cfg");if(r){const c=JSON.parse(r.value);if(c.saveMode)sMode=c.saveMode;}}catch(e){}
    // Pull GitHub au démarrage si option activée
    if(sMode==="github"&&ghPull&&ghTok&&ghGid){
      setGhStatus("⏳ Chargement depuis GitHub…");
      try{
        const res=await fetch(`https://api.github.com/gists/${ghGid}`,{headers:{"Authorization":"token "+ghTok}});
        const data=await res.json();
        const content=data.files?.["budget.json"]?.content;
        if(content){
          const d=JSON.parse(content);
          if(Array.isArray(d.txs))setTxs(d.txs);
          if(typeof d.initBal==="number")setInitBal(d.initBal);
          if(d.lang)setLang(d.lang);if(d.cur)setCur(d.cur);
          if(d.disp)setDisp(d.disp);if(d.darkMode)setDarkMode(d.darkMode);
          if(d.budgets)setBudgets(d.budgets);
          setGhStatus("✓ Données GitHub chargées");
        }
      }catch(e){setGhStatus("⚠ Pull GitHub échoué");}
      setTimeout(()=>setGhStatus(""),3500);
    }
    setLoaded(true);
  })();},[]);

  // Sauvegarde config (toujours locale, immédiate)
  useEffect(()=>{
    if(!loaded)return;
    clearTimeout(cfgTimer.current);
    cfgTimer.current=setTimeout(async()=>{
      try{
        await window.storage.set("bgt9-cfg",JSON.stringify({lang,cur,disp,darkMode,mode,saveMode,saveAuto}));
        await window.storage.set("bgt9-gh",JSON.stringify({token:ghToken,gistId:ghGistId,pullOnStart:ghPullOnStart}));
      }catch(e){}
    },400);
  },[lang,cur,disp,darkMode,mode,saveMode,saveAuto,ghToken,ghGistId,loaded]);

  // Sauvegarde données automatique — local
  useEffect(()=>{
    if(!loaded||!saveAuto||saveMode!=="local")return;
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        await window.storage.set("bgt9-tx",JSON.stringify(txs));
        await window.storage.set("bgt9-bal",String(initBal));
        await window.storage.set("bgt9-bud",JSON.stringify(budgets));
        setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);
      }catch(e){setSaveStatus("error");}
    },600);
  },[txs,initBal,budgets,loaded,saveAuto,saveMode]);

  // Sauvegarde données automatique — GitHub
  useEffect(()=>{
    if(!loaded||!saveAuto||saveMode!=="github"||!ghToken)return;
    clearTimeout(ghTimer.current);
    ghTimer.current=setTimeout(async()=>{
      try{
        const json=JSON.stringify({txs,initBal,lang,cur,disp,darkMode,budgets},null,2);
        const body={files:{"budget.json":{content:json}}};
        let res,data;
        if(ghGistId){res=await fetch(`https://api.github.com/gists/${ghGistId}`,{method:"PATCH",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify(body)});}
        else{res=await fetch("https://api.github.com/gists",{method:"POST",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify({...body,description:"Budget App Data",public:false})});}
        data=await res.json();
        if(data.id){
          if(data.id!==ghGistId)setGhGistId(data.id);
          setGhStatus("✓ GitHub sync");setTimeout(()=>setGhStatus(""),3000);
        }
      }catch(e){setGhStatus("⚠ Sync échoué");setTimeout(()=>setGhStatus(""),3000);}
    },3000);
  },[txs,initBal,budgets,loaded,saveAuto,saveMode,ghToken,ghGistId]);

  const saveLocalNow=async()=>{
    setSaveStatus("saving");
    try{
      await window.storage.set("bgt9-tx",JSON.stringify(txs));
      await window.storage.set("bgt9-bal",String(initBal));
      await window.storage.set("bgt9-bud",JSON.stringify(budgets));
      setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);
    }catch(e){setSaveStatus("error");}
  };

  const ghPush=async()=>{
    if(!ghToken){setGhStatus("❌ Token manquant");return;}
    setGhStatus("⏳ Envoi…");
    try{
      const body={files:{"budget.json":{content:getExportJSON()}}};
      let res,data;
      if(ghGistId){res=await fetch(`https://api.github.com/gists/${ghGistId}`,{method:"PATCH",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify(body)});}
      else{res=await fetch("https://api.github.com/gists",{method:"POST",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify({...body,description:"Budget App Data",public:false})});}
      data=await res.json();
      if(data.id){setGhGistId(data.id);setGhStatus("✓ Sauvegardé sur GitHub");}
      else setGhStatus("❌ "+(data.message||"Erreur inconnue"));
    }catch(e){setGhStatus("❌ "+e.message);}
    setTimeout(()=>setGhStatus(""),4000);
  };

  const ghPull=async()=>{
    if(!ghToken||!ghGistId){setGhStatus("❌ Token ou Gist ID manquant");return;}
    setGhStatus("⏳ Chargement…");
    try{
      const res=await fetch(`https://api.github.com/gists/${ghGistId}`,{headers:{"Authorization":"token "+ghToken}});
      const data=await res.json();
      const content=data.files?.["budget.json"]?.content;
      if(!content){setGhStatus("❌ Fichier introuvable");return;}
      const d=JSON.parse(content);
      if(Array.isArray(d.txs))setTxs(d.txs);if(typeof d.initBal==="number")setInitBal(d.initBal);
      if(d.lang)setLang(d.lang);if(d.cur)setCur(d.cur);if(d.disp)setDisp(d.disp);if(d.darkMode)setDarkMode(d.darkMode);if(d.budgets)setBudgets(d.budgets);
      setGhStatus("✓ Données restaurées");
    }catch(e){setGhStatus("❌ "+e.message);}
    setTimeout(()=>setGhStatus(""),4000);
  };

  const handleManualSave=()=>{
    if(saveMode==="local")saveLocalNow();
    else ghPush();
  };

  const getExportJSON=()=>JSON.stringify({txs,initBal,lang,cur,disp,darkMode,budgets},null,2);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};
  const handleCopy=()=>{const json=getExportJSON();if(navigator.clipboard?.writeText){navigator.clipboard.writeText(json).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});}};

  const handleImport=()=>{
    try{const d=JSON.parse(importText);if(Array.isArray(d.txs))setTxs(d.txs);if(typeof d.initBal==="number")setInitBal(d.initBal);if(d.lang)setLang(d.lang);if(d.cur)setCur(d.cur);if(d.disp)setDisp(d.disp);if(d.darkMode)setDarkMode(d.darkMode);if(d.budgets)setBudgets(d.budgets);setImportMod(false);setImportText("");showToast(t.importOk);}
    catch(e){showToast(t.importErr);}
  };

  const deleteAccount=async()=>{
    for(const k of["bgt9-tx","bgt9-bal","bgt9-bud","bgt9-cfg","bgt9-gh"])try{await window.storage.delete(k);}catch(e){}
    setTxs([]);setInitBal(1000);setBudgets({});setDisp({curBal:true,endBal:false,revExp:false,net:false});setDarkMode("off");setGhToken("");setGhGistId("");setAuth(false);
  };

  const dim=new Date(yr,mo+1,0).getDate();
  const cells=useMemo(()=>{const fd=new Date(yr,mo,1).getDay();return[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];},[yr,mo,dim]);
  const dayData=useMemo(()=>{const d={};for(let day=1;day<=dim;day++){const dt=txs.filter(tx=>occsInMonth(tx,yr,mo).includes(day));d[day]={net:dt.reduce((s,tx)=>s+(tx.type==="income"?tx.amount:-tx.amount),0),bal:balAt(txs,initBal,new Date(yr,mo,day)),count:dt.length,cats:dt.map(tx=>catById(tx.category||"other"))};}return d;},[txs,yr,mo,dim,initBal]);
  const monthStats=useMemo(()=>{let inc=0,exp=0;txs.forEach(tx=>{const n=occsInMonth(tx,yr,mo).length;if(tx.type==="income")inc+=tx.amount*n;else exp+=tx.amount*n;});return{inc,exp,net:inc-exp};},[txs,yr,mo]);
  const catStats=useMemo(()=>{const s={};CATS.forEach(c=>s[c.id]={spent:0,income:0});txs.forEach(tx=>{const cat=tx.category||"other";const n=occsInMonth(tx,yr,mo).length;if(n===0)return;if(tx.type==="income")s[cat].income+=tx.amount*n;else s[cat].spent+=tx.amount*n;});return s;},[txs,yr,mo]);
  const totalBudget=useMemo(()=>CATS.filter(c=>c.id!=="income").reduce((s,c)=>s+(budgets[c.id]||0),0),[budgets]);
  const totalSpent=useMemo(()=>CATS.filter(c=>c.id!=="income").reduce((s,c)=>s+(catStats[c.id]?.spent||0),0),[catStats]);
  const isTod=d=>d===TODAY.getDate()&&mo===TODAY.getMonth()&&yr===TODAY.getFullYear();
  const prevMo=()=>mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1);
  const nextMo=()=>mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1);
  const goToday=()=>{setMo(TODAY.getMonth());setYr(TODAY.getFullYear());};
  const openForm=(tx=null,prefill=null)=>{const dt=prefill||dStr(TODAY);setFormMod({tx,form:tx?{desc:tx.description,amt:String(tx.amount),type:tx.type,rec:normRec(tx.recurrence,parseD(tx.startDate)),date:tx.startDate,cat:tx.category||"other"}:{desc:"",amt:"",type:"expense",rec:{type:"once"},date:dt,cat:"other"}});};
  const setFF=k=>v=>setFormMod(m=>({...m,form:{...m.form,[k]:v}}));
  const handleTypeChange=v=>setFormMod(m=>({...m,form:{...m.form,type:v,cat:v==="income"?"income":"other"}}));
  const handleDateChange=nd=>{const ns=parseD(nd);const rec=formMod.form.rec;let nr=rec;if(rec.type==="weekly")nr={...rec,weekday:ns.getDay()};else if(rec.type==="monthly_nth_weekday")nr={...rec,nth:getNthWD(ns),weekday:ns.getDay()};setFormMod(m=>({...m,form:{...m.form,date:nd,rec:nr}}));};
  const saveForm=()=>{const{tx,form}=formMod;const amt=parseFloat(form.amt);if(!form.desc.trim()||isNaN(amt)||amt<=0)return;const data={description:form.desc,amount:amt,type:form.type,recurrence:form.rec,startDate:form.date,category:form.cat};if(tx)setTxs(prev=>prev.map(t2=>t2.id===tx.id?{...t2,...data}:t2));else setTxs(prev=>[...prev,{id:Date.now().toString(),...data,exceptions:[]}]);setFormMod(null);};
  const openDel=(tx,dateStr)=>{setDelMod({tx,dateStr});setDayMod(null);};
  const handleDel=scope=>{const{tx,dateStr}=delMod;if(scope==="all"||normRec(tx.recurrence,parseD(tx.startDate)).type==="once"){setTxs(prev=>prev.filter(t2=>t2.id!==tx.id));}else if(scope==="this"){setTxs(prev=>prev.map(t2=>t2.id!==tx.id?t2:{...t2,exceptions:[...(t2.exceptions||[]),dateStr]}));}else if(scope==="follow"){const ne=dayBef(dateStr);if(parseD(ne)<parseD(tx.startDate))setTxs(prev=>prev.filter(t2=>t2.id!==tx.id));else setTxs(prev=>prev.map(t2=>t2.id!==tx.id?t2:{...t2,endDate:ne}));}setDelMod(null);};
  const changeTxCat=(txId,catId)=>{setTxs(prev=>prev.map(tx=>tx.id===txId?{...tx,category:catId}:tx));setExpandedCatTx(null);};

  const curBalVal=balAt(txs,initBal,TODAY);
  const endBalVal=dayData[dim]?.bal??null;
  const dayModalList=dayMod?txs.filter(tx=>occsInMonth(tx,yr,mo).includes(dayMod.day)):[];
  const dayModalDateStr=dayMod?`${yr}-${String(mo+1).padStart(2,"0")}-${String(dayMod.day).padStart(2,"0")}`:"";
  const expenseCats=CATS.filter(c=>c.id!=="income");
  const hasSummary=disp.curBal||disp.endBal||disp.revExp||disp.net;

  if(!auth)return(
    <div style={{minHeight:"100vh",background:th.bgSub,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:th.bg,width:320,padding:"40px 32px",borderRadius:20,border:"1px solid "+th.border,boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
        <p style={{...lbl,marginBottom:4}}>{t.welcome}</p>
        <h1 style={{fontSize:20,color:th.text,fontWeight:600,marginBottom:32}}>{t.title}</h1>
        {[[t.userLbl,u,setU,"text"],[t.passLbl,pw,setPw,"password"]].map(([lb,val,set,type])=>(<div key={lb} style={{marginBottom:20}}><label style={lbl}>{lb}</label><input type={type} value={val} onChange={e=>set(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")(u==="test"&&pw==="test"?setAuth(true):setAErr(t.badLogin));}} style={iSt} placeholder={type==="password"?"••••••••":lb}/></div>))}
        {aErr&&<p style={{fontSize:12,color:th.danger,marginBottom:12}}>{aErr}</p>}
        <button onClick={()=>(u==="test"&&pw==="test"?setAuth(true):setAErr(t.badLogin))} style={{width:"100%",marginTop:8,background:th.btnBg,color:th.btnText,border:"none",borderRadius:12,padding:"11px 0",fontSize:14,cursor:"pointer"}}>{t.loginBtn}</button>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:th.bg,fontFamily:"system-ui,sans-serif"}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:th.btnBg,color:th.btnText,padding:"10px 20px",borderRadius:20,fontSize:13,fontWeight:500,zIndex:100,boxShadow:"0 4px 16px rgba(0,0,0,0.2)",pointerEvents:"none"}}>{toast}</div>}

      {/* Indicateur sauvegarde + bouton manuel */}
      <div style={{position:"fixed",bottom:16,right:16,zIndex:99,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
        {!saveAuto&&<button onClick={handleManualSave} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",borderRadius:20,fontSize:12,fontWeight:600,background:th.btnBg,color:th.btnText,border:"none",cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.18)"}}>↑ Sauvegarder</button>}
        {ghStatus&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:500,background:ghStatus.startsWith("✓")?"#f0fdf4":ghStatus.startsWith("⏳")?th.surface:th.bg,border:ghStatus.startsWith("✓")?"1px solid #86efac":"1px solid "+th.border,color:ghStatus.startsWith("✓")?"#059669":ghStatus.startsWith("⏳")?th.sub:th.danger,boxShadow:"0 2px 12px rgba(0,0,0,0.1)",pointerEvents:"none"}}>{ghStatus}</div>}
        {saveStatus!=="idle"&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:500,background:saveStatus==="error"?th.bg:saveStatus==="saved"?"#f0fdf4":th.surface,border:saveStatus==="error"?"1px solid "+th.danger:saveStatus==="saved"?"1px solid #86efac":"1px solid "+th.border,color:saveStatus==="error"?th.danger:saveStatus==="saved"?"#059669":th.sub,boxShadow:"0 2px 12px rgba(0,0,0,0.1)",pointerEvents:"none"}}>{saveStatus==="saving"&&<span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:th.sub,animation:"pulse 1s infinite"}}/>}{saveStatus==="saving"?t.saving:saveStatus==="saved"?"✓ "+t.saved:"⚠ "+t.saveErr}</div>}
      </div>

      <div style={{padding:"32px 24px 20px",borderBottom:"1px solid "+th.border}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div><p style={{...lbl,marginBottom:4}}>{t.sub}</p><h1 style={{fontSize:20,color:th.text,fontWeight:600,margin:0}}>{t.title}</h1></div>
          <button onClick={()=>openForm()} style={{display:"flex",alignItems:"center",gap:6,background:th.btnBg,color:th.btnText,border:"none",borderRadius:12,padding:"9px 16px",fontSize:13,cursor:"pointer",fontWeight:500}}><span style={{fontSize:18,lineHeight:1}}>+</span>{t.add}</button>
        </div>
      </div>
      <div style={{padding:"0 24px",borderBottom:"1px solid "+th.border,display:"flex",gap:20,overflowX:"auto"}}>
        {[["calendar",t.tabs[0]],["transactions",t.tabs[1]],["budget",t.tabs[2]],["settings",t.tabs[3]]].map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{fontSize:13,paddingBottom:12,paddingTop:16,border:"none",background:"none",cursor:"pointer",borderBottom:tab===k?"2px solid "+th.text:"2px solid transparent",color:tab===k?th.text:th.muted,fontWeight:tab===k?500:400,transition:"color 0.15s",whiteSpace:"nowrap"}}>{l}</button>))}
      </div>

      <div style={{padding:"24px",maxWidth:640}}>

        {/* ── CALENDRIER ── */}
        {tab==="calendar"&&<div>
          {/* Nav mois + toggle mode */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:hasSummary?16:20}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <button onClick={prevMo} style={{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",background:"none",border:"none",cursor:"pointer",fontSize:20,color:th.muted,borderRadius:8}}>‹</button>
              <span onDoubleClick={goToday} style={{fontSize:15,color:th.text,fontWeight:500,minWidth:164,textAlign:"center",cursor:"default",userSelect:"none"}}>{t.months[mo]} {yr}</span>
              <button onClick={nextMo} style={{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",background:"none",border:"none",cursor:"pointer",fontSize:20,color:th.muted,borderRadius:8}}>›</button>
            </div>
            <SegCtrl options={[["daily",t.modDay],["balance",t.modBal]]} value={mode} onChange={setMode} th={th}/>
          </div>

          {/* ── RÉSUMÉ (au-dessus de l'agenda) ── */}
          {hasSummary&&<div style={{marginBottom:20,paddingBottom:20,borderBottom:"1px solid "+th.border,display:"flex",flexWrap:"wrap",gap:"16px 28px"}}>
            {disp.curBal&&<div><p style={{...lbl,margin:"0 0 4px"}}>{t.curBalLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:curBalVal>=0?"#059669":"#ef4444"}}>{fA(curBalVal,cur,true)}</p></div>}
            {disp.endBal&&endBalVal!==null&&<div><p style={{...lbl,margin:"0 0 4px"}}>{t.endBalLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:endBalVal>=0?"#059669":"#ef4444"}}>{fA(endBalVal,cur,true)}</p></div>}
            {disp.revExp&&<><div><p style={{...lbl,margin:"0 0 4px"}}>{t.revLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:"#059669"}}>+{fA(monthStats.inc,cur,true)}</p></div><div><p style={{...lbl,margin:"0 0 4px"}}>{t.expLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:"#ef4444"}}>−{fA(monthStats.exp,cur,true)}</p></div></>}
            {disp.net&&<div><p style={{...lbl,margin:"0 0 4px"}}>{t.netLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:monthStats.net>=0?"#059669":"#ef4444"}}>{monthStats.net>=0?"+":"−"}{fA(monthStats.net,cur,true)}</p></div>}
          </div>}

          {/* Jours de la semaine */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>{t.days.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,color:th.muted,padding:"4px 0"}}>{d.slice(0,3)}</div>)}</div>
          {/* Grille */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells.map((day,i)=>{
              if(!day)return<div key={"e"+i} style={{paddingBottom:"100%"}}/>;
              const data=dayData[day]||{net:0,bal:0,count:0,cats:[]};const tod=isTod(day);const val=mode==="daily"?data.net:data.bal;const pos=val>0,neg=val<0;
              return(<div key={day} onClick={()=>setDayMod({day})} style={{paddingBottom:"100%",position:"relative",borderRadius:10,cursor:"pointer",background:tod?th.surface:"transparent",border:tod?"1.5px solid "+th.text:"1.5px solid transparent"}}>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                  <span style={{fontSize:12,fontWeight:tod?600:400,color:tod?th.text:th.sub}}>{day}</span>
                  {data.count>0&&<span style={{fontSize:10,fontWeight:500,fontVariantNumeric:"tabular-nums",lineHeight:1.2,color:pos?"#059669":neg?"#ef4444":th.muted}}>{mode==="daily"?(val>=0?"+":"−")+fA(val,cur):(val>=0?"":"-")+fA(val,cur)}</span>}
                  {data.cats.length>0&&<div style={{display:"flex",gap:2,marginTop:1}}>{[...new Set(data.cats.map(c=>c.color))].slice(0,3).map((c,ci)=><div key={ci} style={{width:4,height:4,borderRadius:"50%",background:c}}/>)}</div>}
                </div>
              </div>);
            })}
          </div>
        </div>}

        {/* ── TRANSACTIONS ── */}
        {tab==="transactions"&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}><p style={{...lbl,margin:0}}>{t.txCount(txs.length)}</p><button onClick={()=>openForm()} style={{fontSize:13,color:th.sub,background:"none",border:"none",cursor:"pointer"}}>+ {t.add}</button></div>
          {txs.length===0
            ?<div style={{textAlign:"center",padding:"60px 0"}}><p style={{fontSize:32,color:th.border,margin:"0 0 8px"}}>◎</p><p style={{fontSize:13,color:th.muted}}>{t.noTx}</p><button onClick={()=>openForm()} style={{marginTop:16,fontSize:13,color:th.sub,border:"1px solid "+th.border,borderRadius:10,padding:"8px 16px",background:"none",cursor:"pointer"}}>{t.addTx}</button></div>
            :[...txs].sort((a,b)=>new Date(b.startDate)-new Date(a.startDate)).map(tx=>{const cat=catById(tx.category||"other");return(<div key={tx.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid "+th.border}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:9,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{cat.emoji}</div><div><p style={{fontSize:13,color:th.text,margin:0,fontWeight:500}}>{tx.description}</p><p style={{fontSize:11,color:th.muted,margin:"3px 0 0"}}>{t.catNames[cat.id]} · {recLabel(tx,t)}</p></div></div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}><span style={{fontSize:13,fontWeight:500,fontVariantNumeric:"tabular-nums",color:tx.type==="income"?"#059669":"#ef4444"}}>{tx.type==="income"?"+":"−"}{fA(tx.amount,cur,true)}</span><button onClick={()=>openForm(tx)} style={{fontSize:13,color:th.muted,background:"none",border:"none",cursor:"pointer",padding:4}}>✎</button></div>
            </div>);})}
        </div>}

        {/* ── BUDGET ── */}
        {tab==="budget"&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <button onClick={prevMo} style={{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",background:"none",border:"none",cursor:"pointer",fontSize:20,color:th.muted,borderRadius:8}}>‹</button>
              <span onDoubleClick={goToday} style={{fontSize:15,color:th.text,fontWeight:500,minWidth:164,textAlign:"center",cursor:"default",userSelect:"none"}}>{t.months[mo]} {yr}</span>
              <button onClick={nextMo} style={{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",background:"none",border:"none",cursor:"pointer",fontSize:20,color:th.muted,borderRadius:8}}>›</button>
            </div>
          </div>
          {totalBudget>0&&<div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,padding:"16px 18px",marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,color:th.text,fontWeight:500}}>{t.budgetTotal}</span><span style={{fontSize:13,fontWeight:600,fontVariantNumeric:"tabular-nums",color:totalSpent>totalBudget?"#ef4444":"#059669"}}>{fA(totalSpent,cur,true)} <span style={{color:th.muted,fontWeight:400}}>{t.budgetOf} {fA(totalBudget,cur,true)}</span></span></div><div style={{height:6,background:th.surface,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:Math.min(totalSpent/totalBudget*100,100)+"%",borderRadius:3,background:totalSpent>totalBudget?"#ef4444":totalSpent/totalBudget>0.8?"#f59e0b":"#10b981",transition:"width 0.4s"}}/></div></div>}
          <p style={{...lbl,marginBottom:16}}>{t.budgetLbl}</p>
          {expenseCats.map(cat=>{const stats=catStats[cat.id]||{spent:0};const budget=budgets[cat.id]||0;const pct=budget>0?Math.min(stats.spent/budget*100,100):0;const over=budget>0&&stats.spent>budget;return(<div key={cat.id} style={{marginBottom:14,background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,padding:"14px 16px"}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:38,height:38,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cat.emoji}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}><span style={{fontSize:13,color:th.text,fontWeight:500}}>{t.catNames[cat.id]}</span><div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><span style={{fontSize:13,fontVariantNumeric:"tabular-nums",color:over?"#ef4444":stats.spent>0?th.text:th.muted}}>{fA(stats.spent,cur,true)}</span>{budget>0&&<span style={{fontSize:12,color:th.muted}}>{t.budgetOf}</span>}<input type="number" min={0} step={10} value={budget||""} onChange={e=>setBudgets(b=>({...b,[cat.id]:parseFloat(e.target.value)||0}))} placeholder={t.budgetUnset} style={{width:72,fontSize:12,textAlign:"right",color:"#2563eb",background:"transparent",border:"none",borderBottom:"1px dashed "+th.inputBorder,outline:"none",fontVariantNumeric:"tabular-nums"}}/></div></div><div style={{height:5,background:th.surface,borderRadius:2.5,overflow:"hidden"}}>{budget>0&&<div style={{height:"100%",width:pct+"%",background:over?"#ef4444":pct>80?"#f59e0b":"#10b981",borderRadius:2.5,transition:"width 0.4s"}}/>}</div></div></div></div>);})}
          {monthStats.inc>0&&<div style={{marginTop:8,background:"#05966915",border:"1px solid #05966930",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}><div style={{width:38,height:38,borderRadius:10,background:"#05966922",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💰</div><div><p style={{fontSize:13,color:th.text,margin:0,fontWeight:500}}>{t.revenuSummary}</p><p style={{fontSize:12,color:"#059669",margin:"2px 0 0",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>+{fA(monthStats.inc,cur,true)}</p></div></div>}
        </div>}

        {/* ── PARAMÈTRES ── */}
        {tab==="settings"&&<div>
          <p style={{...lbl,marginBottom:8}}>{t.tabs[3]}</p>
          <div style={{padding:"12px 0",borderBottom:"1px solid "+th.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><p style={{fontSize:13,color:th.text,margin:0,fontWeight:500}}>{t.initBalLbl}</p><p style={{fontSize:11,color:th.muted,margin:"3px 0 0"}}>{t.initBalSub}</p></div><div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" value={initBal} step="0.01" onChange={e=>setInitBal(parseFloat(e.target.value)||0)} style={{width:96,textAlign:"right",fontSize:13,color:"#2563eb",background:"transparent",border:"none",outline:"none",fontVariantNumeric:"tabular-nums"}}/><span style={{fontSize:11,color:th.muted}}>$</span></div></div>
          <Sel label={t.langLbl} value={lang} opts={t.langOpts} onChange={setLang} th={th}/>
          <Sel label={t.curLbl} value={cur} opts={t.curOpts} onChange={setCur} th={th}/>
          <p style={{...lbl,margin:"24px 0 4px"}}>{t.dispLbl}</p>
          <Tog label={t.showCurBal} value={disp.curBal} onChange={v=>setDisp(d=>({...d,curBal:v}))} th={th}/>
          <Tog label={t.showEndBal} value={disp.endBal} onChange={v=>setDisp(d=>({...d,endBal:v}))} th={th}/>
          <Tog label={t.showRevExp} value={disp.revExp} onChange={v=>setDisp(d=>({...d,revExp:v}))} th={th}/>
          <Tog label={t.showNet} value={disp.net} onChange={v=>setDisp(d=>({...d,net:v}))} th={th}/>
          <p style={{...lbl,margin:"24px 0 4px"}}>{t.darkLbl}</p>
          <div style={{paddingBottom:16,borderBottom:"1px solid "+th.border}}><SegCtrl options={[["off",t.darkOff],["auto",t.darkAuto],["on",t.darkOn]]} value={darkMode} onChange={setDarkMode} th={th}/></div>

          {/* ── SAUVEGARDE ── */}
          <p style={{...lbl,margin:"24px 0 8px"}}>Sauvegarde</p>
          <div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,padding:16,marginBottom:20,display:"flex",flexDirection:"column",gap:16}}>

            {/* Destination */}
            <div>
              <p style={{fontSize:11,color:th.muted,margin:"0 0 8px",letterSpacing:"0.08em",textTransform:"uppercase"}}>Destination</p>
              <SegCtrl options={[["local","💾 Local"],["github","☁️ GitHub"]]} value={saveMode} onChange={setSaveMode} th={th}/>
            </div>

            {/* Champs GitHub */}
            {saveMode==="github"&&<div style={{display:"flex",flexDirection:"column",gap:12,paddingTop:4,borderTop:"1px solid "+th.border}}>
              <div>
                <label style={lbl}>Personal Access Token</label>
                <input type="password" value={ghToken} onChange={e=>setGhToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" style={{...iSt,fontSize:12,fontFamily:"monospace"}}/>
              </div>
              <div>
                <label style={lbl}>Gist ID <span style={{color:th.muted,textTransform:"none",fontSize:10,letterSpacing:0}}>(auto après 1ère sauvegarde)</span></label>
                <input type="text" value={ghGistId} onChange={e=>setGhGistId(e.target.value)} placeholder="Laisser vide pour créer un nouveau Gist" style={{...iSt,fontSize:12,fontFamily:"monospace"}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={ghPush} style={{flex:1,padding:"10px 0",fontSize:13,border:"none",borderRadius:10,background:"#24292f",color:"#fff",cursor:"pointer",fontWeight:500}}>↑ Sauvegarder</button>
                <button onClick={ghPull} style={{flex:1,padding:"10px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.text,cursor:"pointer"}}>↓ Restaurer</button>
              </div>
              <Tog label="Charger au démarrage" sub="Pull automatique depuis GitHub à l'ouverture" value={ghPullOnStart} onChange={v=>setGhPullOnStart(v)} th={th}/>
              {ghStatus&&<p style={{fontSize:12,margin:0,color:ghStatus.startsWith("✓")?"#059669":ghStatus.startsWith("⏳")?th.sub:"#ef4444"}}>{ghStatus}</p>}
              <p style={{fontSize:11,color:th.muted,margin:0,lineHeight:1.5}}>Gist <strong>privé</strong>. Token requis : permission <code>gist</code> seulement.</p>
            </div>}

            {/* Déclenchement */}
            <div style={{borderTop:"1px solid "+th.border,paddingTop:14}}>
              <p style={{fontSize:11,color:th.muted,margin:"0 0 8px",letterSpacing:"0.08em",textTransform:"uppercase"}}>Déclenchement</p>
              <SegCtrl options={[["auto","⚡ Auto (3s)"],["manual","✋ Manuel"]]} value={saveAuto?"auto":"manual"} onChange={v=>setSaveAuto(v==="auto")} th={th}/>
            </div>

            {/* Bouton sauvegarde manuelle */}
            {!saveAuto&&<button onClick={handleManualSave} style={{padding:"11px 0",fontSize:13,fontWeight:600,border:"none",borderRadius:10,background:th.btnBg,color:th.btnText,cursor:"pointer"}}>↑ Sauvegarder maintenant</button>}
          </div>

          {/* Données */}
          <p style={{...lbl,margin:"0 0 8px"}}>{t.exportLbl}</p>
          <div style={{display:"flex",gap:8,paddingBottom:20,borderBottom:"1px solid "+th.border}}>
            <button onClick={()=>setExportMod(true)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.text,cursor:"pointer"}}>↑ {t.exportBtn}</button>
            <button onClick={()=>{setImportText("");setImportMod(true);}} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.text,cursor:"pointer"}}>↓ {t.importBtn}</button>
          </div>
          <div style={{marginTop:20,padding:"16px",background:isDark?"rgba(239,68,68,0.07)":"#fff5f5",border:"1px solid "+th.danger+"44",borderRadius:14}}>
            <p style={{fontSize:13,color:th.danger,margin:"0 0 2px",fontWeight:600}}>{t.delAccLbl}</p>
            <p style={{fontSize:11,color:th.muted,margin:"0 0 12px"}}>{t.delAccSub}</p>
            <button onClick={()=>{setDelAccMod(true);setDelAccInput("");}} style={{fontSize:13,color:th.danger,background:"none",border:"1px solid "+th.danger,borderRadius:10,padding:"8px 16px",cursor:"pointer"}}>{t.delAccLbl} →</button>
          </div>
          <div style={{marginTop:28}}><button onClick={()=>{setAuth(false);setU("");setPw("");}} style={{fontSize:13,color:th.muted,background:"none",border:"none",cursor:"pointer"}}>{t.logout}</button></div>
        </div>}
      </div>

      {/* ── MODALS ── */}
      {exportMod&&<Sheet onClose={()=>setExportMod(false)} th={th}><SheetHead title={t.exportModalTitle} onClose={()=>setExportMod(false)} th={th}/><p style={{fontSize:12,color:th.sub,marginBottom:12}}>{t.exportInstr}</p><textarea readOnly value={getExportJSON()} style={{width:"100%",height:180,padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:th.sub,background:th.surface,border:"1px solid "+th.border,borderRadius:10,resize:"none",boxSizing:"border-box",lineHeight:1.5}}/><div style={{display:"flex",gap:8,marginTop:12}}><button onClick={()=>setExportMod(false)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.exportClose}</button><button onClick={handleCopy} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:copied?"#059669":th.btnBg,color:copied?"#fff":th.btnText,cursor:"pointer",fontWeight:500,transition:"background 0.2s"}}>{copied?t.exportCopied:t.exportCopy}</button></div></Sheet>}
      {importMod&&<Sheet onClose={()=>setImportMod(false)} th={th}><SheetHead title={t.importModalTitle} onClose={()=>setImportMod(false)} th={th}/><p style={{fontSize:12,color:th.sub,marginBottom:12}}>{t.importInstr}</p><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder={t.importPaste} style={{width:"100%",height:200,padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:th.text,background:th.surface,border:"1px solid "+th.border,borderRadius:10,resize:"none",boxSizing:"border-box",lineHeight:1.5}}/><div style={{display:"flex",gap:8,marginTop:12}}><button onClick={()=>setImportMod(false)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button><button onClick={handleImport} disabled={!importText.trim()} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:importText.trim()?th.btnBg:th.surface,color:importText.trim()?th.btnText:th.muted,cursor:importText.trim()?"pointer":"default",fontWeight:500}}>{t.importRestore}</button></div></Sheet>}
      {dayMod&&<Sheet onClose={()=>{setDayMod(null);setExpandedCatTx(null);}} th={th}><SheetHead title={t.months[mo]+" "+dayMod.day} onClose={()=>{setDayMod(null);setExpandedCatTx(null);}} th={th} right={<button onClick={()=>{setDayMod(null);openForm(null,dayModalDateStr);}} style={{fontSize:12,color:th.sub,background:"none",border:"1px solid "+th.border,borderRadius:8,padding:"5px 11px",cursor:"pointer"}}>+ {t.add}</button>}/>
        {dayModalList.length===0?<div style={{textAlign:"center",padding:"32px 0"}}><p style={{fontSize:13,color:th.muted}}>{t.emptyDay}</p></div>
        :dayModalList.map(tx=>{const cat=catById(tx.category||"other");const isExp=expandedCatTx===tx.id;return(<div key={tx.id}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0",borderBottom:isExp?"none":"1px solid "+th.border}}><div style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}} onClick={()=>setExpandedCatTx(isExp?null:tx.id)}><div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,border:"2px solid "+(isExp?cat.color:"transparent"),transition:"border 0.15s"}}>{cat.emoji}</div><div><p style={{fontSize:13,color:th.text,margin:0,fontWeight:500}}>{tx.description}</p><p style={{fontSize:11,margin:"2px 0 0",color:cat.color,fontWeight:500}}>{t.catNames[cat.id]} · {tx.type==="income"?t.incomeLbl:t.expenseLbl}</p></div></div><div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}><span style={{fontSize:13,fontWeight:500,fontVariantNumeric:"tabular-nums",color:tx.type==="income"?"#059669":"#ef4444"}}>{tx.type==="income"?"+":"−"}{fA(tx.amount,cur,true)}</span><button onClick={e=>{e.stopPropagation();openDel(tx,dayModalDateStr);}} style={{fontSize:15,color:th.muted,background:"none",border:"none",cursor:"pointer",padding:"4px 6px",lineHeight:1,borderRadius:6}}>✕</button></div></div>{isExp&&<div style={{padding:"10px 0 16px 46px",borderBottom:"1px solid "+th.border}}><p style={{fontSize:10,color:th.muted,letterSpacing:"0.1em",textTransform:"uppercase",margin:"0 0 8px"}}>{t.quickCatLbl}</p><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{CATS.map(c=>(<button key={c.id} onClick={()=>changeTxCat(tx.id,c.id)} title={t.catNames[c.id]} style={{width:36,height:36,borderRadius:9,background:c.id===cat.id?c.color+"30":th.surface,border:"2px solid "+(c.id===cat.id?c.color:"transparent"),fontSize:18,cursor:"pointer",transition:"all 0.15s"}}>{c.emoji}</button>))}</div></div>}</div>);})}
      </Sheet>}
      {delMod&&<Sheet onClose={()=>setDelMod(null)} th={th}><h3 style={{fontSize:15,color:th.text,fontWeight:600,margin:"0 0 4px"}}>{t.delTitle}</h3><p style={{fontSize:12,color:th.muted,margin:"0 0 20px"}}>{delMod.tx.description}</p><div style={{display:"flex",flexDirection:"column",gap:8}}>{normRec(delMod.tx.recurrence,parseD(delMod.tx.startDate)).type==="once"?<button onClick={()=>handleDel("all")} style={{padding:"13px 16px",textAlign:"left",fontSize:14,color:"#ef4444",background:isDark?"rgba(239,68,68,0.1)":"#fff5f5",border:"none",borderRadius:12,cursor:"pointer",fontWeight:500}}>{t.allEvts}</button>:[["this",t.thisEvt],["follow",t.thisFollow],["all",t.allEvts]].map(([sc,lb])=>(<button key={sc} onClick={()=>handleDel(sc)} style={{padding:"13px 16px",textAlign:"left",fontSize:14,color:sc==="all"?"#ef4444":th.text,background:sc==="all"?(isDark?"rgba(239,68,68,0.1)":"#fff5f5"):th.surface,border:"none",borderRadius:12,cursor:"pointer",fontWeight:sc==="all"?500:400}}>{lb}</button>))}</div><button onClick={()=>setDelMod(null)} style={{width:"100%",marginTop:12,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button></Sheet>}
      {delAccMod&&<Sheet onClose={()=>{setDelAccMod(false);setDelAccInput("");}} th={th}><div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40,marginBottom:12}}>⚠️</div><h3 style={{fontSize:16,color:th.text,fontWeight:700,margin:"0 0 8px"}}>{t.delAccModalTitle}</h3><p style={{fontSize:13,color:th.sub,margin:0,lineHeight:1.6}}>{t.delAccModalBody}</p></div><div style={{background:th.surface,borderRadius:10,padding:"10px 14px",textAlign:"center",marginBottom:16}}><span style={{fontSize:16,fontWeight:700,letterSpacing:"0.1em",color:th.danger}}>{t.delAccWord}</span></div><input type="text" value={delAccInput} onChange={e=>setDelAccInput(e.target.value)} placeholder={t.delAccWord} style={{...iSt,textAlign:"center",fontSize:15,fontWeight:600,letterSpacing:"0.05em",borderColor:delAccInput===t.delAccWord?"#059669":th.inputBorder,color:delAccInput===t.delAccWord?"#059669":th.text,marginBottom:16}}/><div style={{display:"flex",gap:8}}><button onClick={()=>{setDelAccMod(false);setDelAccInput("");}} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button><button onClick={()=>{if(delAccInput===t.delAccWord){deleteAccount();setDelAccMod(false);}}} disabled={delAccInput!==t.delAccWord} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:delAccInput===t.delAccWord?"#ef4444":th.surface,color:delAccInput===t.delAccWord?"#fff":th.muted,cursor:delAccInput===t.delAccWord?"pointer":"default",fontWeight:500}}>{t.delAccConfirm}</button></div></Sheet>}
      {formMod&&<Sheet onClose={()=>setFormMod(null)} th={th}><SheetHead title={formMod.tx?t.editTx:t.newTx} onClose={()=>setFormMod(null)} th={th}/><div style={{display:"flex",gap:8,marginBottom:20}}>{[["expense",t.expenseLbl],["income",t.incomeLbl]].map(([v,l])=>(<button key={v} onClick={()=>handleTypeChange(v)} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",cursor:"pointer",fontWeight:500,transition:"all 0.15s",background:formMod.form.type===v?(v==="income"?(isDark?"rgba(16,185,129,0.15)":"#ecfdf5"):(isDark?"rgba(239,68,68,0.12)":"#fff5f5")):th.surface,color:formMod.form.type===v?(v==="income"?"#059669":"#ef4444"):th.muted}}>{l}</button>))}</div><div style={{display:"flex",flexDirection:"column",gap:16}}><div><label style={lbl}>{t.descLbl}</label><input type="text" value={formMod.form.desc} onChange={e=>setFF("desc")(e.target.value)} style={iSt}/></div><div><label style={lbl}>{t.amtLbl}</label><input type="number" value={formMod.form.amt} step="0.01" placeholder="0.00" onChange={e=>setFF("amt")(e.target.value)} style={iSt}/></div><div><label style={lbl}>{t.startLbl}</label><input type="date" value={formMod.form.date} onChange={e=>handleDateChange(e.target.value)} style={iSt}/></div><CategoryPicker value={formMod.form.cat} onChange={v=>setFF("cat")(v)} th={th} t={t}/><RecurrencePicker value={formMod.form.rec} onChange={v=>setFF("rec")(v)} startDate={formMod.form.date} t={t} th={th}/></div><div style={{display:"flex",gap:8,marginTop:24,alignItems:"center"}}>{formMod.tx&&<button onClick={()=>{setDelMod({tx:formMod.tx,dateStr:formMod.tx.startDate});setFormMod(null);}} style={{fontSize:13,color:"#f87171",background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>{t.delBtn}</button>}<button onClick={()=>setFormMod(null)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button><button onClick={saveForm} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:th.btnBg,color:th.btnText,cursor:"pointer",fontWeight:500}}>{formMod.tx?t.save:t.add}</button></div></Sheet>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
