// ── Date helpers ───────────────────────────────────────
const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const dayBef=s=>{const d=parseD(s);d.setDate(d.getDate()-1);return dStr(d);};
function getNthWD(date){let c=0;const d=new Date(date.getFullYear(),date.getMonth(),1);while(d<=date){if(d.getDay()===date.getDay())c++;d.setDate(d.getDate()+1);}return c;}
function normRec(rec,s){if(rec&&typeof rec==="object")return rec;const wd=s instanceof Date?s.getDay():parseD(String(s||"2024-01-01")).getDay();return({once:{type:"once"},daily:{type:"daily"},weekly:{type:"weekly",weekday:wd},monthly:{type:"monthly_day"},annual:{type:"annually"}})[rec]||{type:"once"};}

function recLabel(tx,t){
  const s=parseD(tx.startDate);const r=normRec(tx.recurrence,s);
  const wd=r.weekday!==undefined?r.weekday:s.getDay();
  switch(r.type){
    case"once":return t.recOnce;case"daily":return t.recDaily;
    case"weekly":return`${t.recWeeklyPre} ${t.days[wd]}`;
    case"monthly_day":return t.recMonthlyDay;
    case"monthly_nth_weekday":return`${t.recMonthlyPre} ${t.nth[r.nth]||r.nth} ${t.days[r.weekday]}`;
    case"annually":return`${t.recAnnuallyPre} ${s.getDate()} ${t.months[s.getMonth()]}`;
    case"weekdays":return t.recWeekdays;
    case"custom":{const{interval:iv=1,unit:u="week",weekdays:wds=[]}=r;const ul=t.recUnits.find(x=>x.v===u)?.l||u;let lb=`${t.recEvery} ${iv} ${ul}`;if(u==="week"&&wds.length>0)lb+=" · "+wds.map(w=>t.daysS[w]).join(" ");return lb;}
    default:return t.recOnce;
  }
}

function occsInMonth(tx,yr,mo){
  const ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0);
  const s=parseD(tx.startDate),e=tx.endDate?parseD(tx.endDate):null;
  const ex=new Set(tx.exceptions||[]);const r=normRec(tx.recurrence,s);
  if(s>me||(e&&e<ms))return[];
  const ok=d=>d>=ms&&d<=me&&d>=s&&(!e||d<=e)&&!ex.has(dStr(d));
  const snap=d=>new Date(d.getTime());
  if(r.type==="once")return ok(s)?[s.getDate()]:[];
  if(r.type==="daily"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="weekly"){const twd=r.weekday!==undefined?r.weekday:s.getDay();const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const res=[];const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+7);}return res;}
  if(r.type==="monthly_day"){const day=s.getDate();if(day>me.getDate())return[];const d=new Date(yr,mo,day);return ok(d)?[day]:[];}
  if(r.type==="monthly_nth_weekday"){const{nth,weekday:wd2}=r;let c=0;for(let dy=1;dy<=me.getDate();dy++){const d=new Date(yr,mo,dy);if(d.getDay()===wd2){c++;if(c===nth)return ok(d)?[dy]:[];}}return[];}
  if(r.type==="annually"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];const d=new Date(yr,mo,s.getDate());return ok(d)?[s.getDate()]:[]; }
  if(r.type==="weekdays"){const res=[];const d=new Date(s>ms?s:ms);while(d<=me){const w=d.getDay();if(w>0&&w<6&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}return res;}
  if(r.type==="custom"){const{interval:iv=1,unit:u="day",weekdays:wds=[]}=r;const res=[];
    if(u==="day"){const d=new Date(s>ms?s:ms);while(d<=me){if(Math.round((d-s)/86400000)%iv===0&&ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+1);}}
    else if(u==="week"){const wdSet=new Set(wds.length>0?wds:[s.getDay()]);wdSet.forEach(twd=>{const a=new Date(s);while(a.getDay()!==twd)a.setDate(a.getDate()+1);const d=new Date(a);while(d<=me){if(ok(snap(d)))res.push(d.getDate());d.setDate(d.getDate()+iv*7);}});res.sort((a,b)=>a-b);}
    else if(u==="month"){const sm=s.getMonth()+s.getFullYear()*12,cm=mo+yr*12;if((cm-sm)<0||(cm-sm)%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    else if(u==="year"){if(mo!==s.getMonth()||yr<s.getFullYear())return[];if((yr-s.getFullYear())%iv!==0)return[];const d=new Date(yr,mo,s.getDate());if(ok(d))res.push(s.getDate());}
    return res;}
  return[];
}

function countOccs(tx,upTo){const s=parseD(tx.startDate);if(s>upTo)return 0;let count=0,y=s.getFullYear(),m=s.getMonth();const ey=upTo.getFullYear(),em=upTo.getMonth();let its=0;while((y<ey||(y===ey&&m<=em))&&its++<1200){const ocs=occsInMonth(tx,y,m);for(const d of ocs)if(new Date(y,m,d)<=upTo)count++;m++;if(m>11){m=0;y++;}}return count;}
const balAt=(txs,init,date)=>txs.reduce((b,tx)=>b+(tx.type==="income"?1:-1)*tx.amount*countOccs(tx,date),init);
function fA(n,cur,full=false){const a=Math.abs(n);const nm=full?a.toLocaleString("fr-CA",{minimumFractionDigits:2,maximumFractionDigits:2}):a>=10000?(a/1000).toFixed(1)+"k":a>=1000?(a/1000).toFixed(2)+"k":a.toFixed(2);return cur==="usd"?"$"+nm:cur==="eur"?nm+" €":nm+" $";}

function CatPicker({value,onChange,th,cn}){return(<div><div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6,marginTop:10}}>{CATS.map(c=>{const sel=value===c.id;return(<button key={c.id} onClick={()=>onChange(c.id)} title={cn[c.id]} style={{padding:"10px 4px",borderRadius:10,border:"2px solid "+(sel?c.color:"transparent"),background:sel?c.color+"25":th.surface,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:18,lineHeight:1}}>{c.emoji}</span><span style={{fontSize:9,color:sel?c.color:th.muted,fontWeight:sel?600:400}}>{cn[c.id].split(" ")[0]}</span></button>);})}</div></div>);}

function RecPicker({value,onChange,startDate,t,th}){
  const s=useMemo(()=>parseD(startDate),[startDate]);
  const wd=s.getDay(),nth=getNthWD(s);
  const nr=useMemo(()=>normRec(value,s),[value,s]);
  const isCust=nr.type==="custom";
  const opts=useMemo(()=>[{rec:{type:"once"},label:t.recOnce},{rec:{type:"daily"},label:t.recDaily},{rec:{type:"weekly",weekday:wd},label:`${t.recWeeklyPre} ${t.days[wd]}`},{rec:{type:"monthly_nth_weekday",nth,weekday:wd},label:`${t.recMonthlyPre} ${t.nth[nth]||nth} ${t.days[wd]}`},{rec:{type:"annually"},label:`${t.recAnnuallyPre} ${s.getDate()} ${t.months[s.getMonth()]}`},{rec:{type:"weekdays"},label:t.recWeekdays},{rec:null,isCustom:true,label:t.recCustom}],[s,wd,nth,t]);
  const selIdx=useMemo(()=>{if(isCust)return 6;return opts.findIndex(o=>{if(!o.rec)return false;if(o.rec.type!==nr.type)return false;if(o.rec.type==="weekly")return o.rec.weekday===nr.weekday;if(o.rec.type==="monthly_nth_weekday")return o.rec.nth===nr.nth&&o.rec.weekday===nr.weekday;return true;});},[nr,opts,isCust]);
  const lbl={fontSize:10,color:th.muted,letterSpacing:"0.1em",textTransform:"uppercase"};
  return(<div><label style={lbl}>{t.recurLbl}</label>
    <div style={{marginTop:10,border:"1px solid "+th.border,borderRadius:14,overflow:"hidden"}}>
      {opts.map((opt,i)=>(<div key={i}><button onClick={()=>{if(opt.isCustom){if(!isCust)onChange({type:"custom",interval:2,unit:"week",weekdays:[wd]});}else onChange(opt.rec);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:selIdx===i?th.surface:"none",border:"none",borderBottom:i<opts.length-1?"1px solid "+th.border:"none",cursor:"pointer",textAlign:"left"}}><div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,border:selIdx===i?"5px solid "+th.text:"2px solid "+th.muted,background:th.bg,transition:"all 0.15s"}}/><span style={{fontSize:13,color:th.text}}>{opt.label}</span></button>
        {opt.isCustom&&isCust&&(<div style={{padding:"14px 14px 16px 44px",background:th.surface,borderTop:"1px solid "+th.border}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:12,color:th.sub}}>{t.recEvery}</span><input type="number" min={1} max={99} value={nr.interval||1} onChange={e=>onChange({...nr,interval:Math.max(1,parseInt(e.target.value)||1)})} style={{width:44,textAlign:"center",fontSize:13,color:th.text,background:th.bg,border:"1px solid "+th.border,borderRadius:7,padding:"5px 4px"}}/><select value={nr.unit||"week"} onChange={e=>onChange({...nr,unit:e.target.value})} style={{fontSize:13,color:th.text,background:th.bg,border:"1px solid "+th.border,borderRadius:7,padding:"5px 8px",cursor:"pointer"}}>{t.recUnits.map(u=><option key={u.v} value={u.v}>{u.l}</option>)}</select></div>
          {(nr.unit||"week")==="week"&&(<div style={{display:"flex",gap:5,marginTop:12}}>{t.daysS.map((d,di)=>{const wds=nr.weekdays||[wd],on=wds.includes(di);return(<button key={di} onClick={()=>{let nw=on?wds.filter(x=>x!==di):[...wds,di];if(nw.length===0)nw=[di];onChange({...nr,weekdays:nw});}} style={{width:33,height:33,borderRadius:"50%",fontSize:12,fontWeight:500,background:on?th.btnBg:th.bg,color:on?th.btnText:th.sub,border:"1.5px solid "+(on?th.btnBg:th.border),cursor:"pointer"}}>{d}</button>);})}</div>)}
        </div>)}
      </div>))}
    </div>
  </div>);
}

        <button onClick={()=>(u==="test"&&pw==="test"?setAuth(true):setAErr(isFr?"Identifiants invalides":"Invalid credentials"))} style={{width:"100%",marginTop:8,background:th.btnBg,color:th.btnText,border:"none",borderRadius:12,padding:"11px 0",fontSize:14,cursor:"pointer"}}>{isFr?"Se connecter":"Sign in"}</button>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:th.bg,fontFamily:"system-ui,sans-serif",paddingBottom:80}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:th.btnBg,color:th.btnText,padding:"10px 20px",borderRadius:20,fontSize:13,fontWeight:500,zIndex:100,boxShadow:"0 4px 16px rgba(0,0,0,0.2)",pointerEvents:"none"}}>{toast}</div>}

      {/* FAB */}
      <div style={{position:"fixed",bottom:16,right:16,zIndex:99,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
        <button onClick={()=>openForm()} style={{width:52,height:52,borderRadius:"50%",background:th.btnBg,color:th.btnText,border:"none",cursor:"pointer",fontSize:28,fontWeight:300,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        {!saveAuto&&<button onClick={handleManualSave} style={{padding:"9px 14px",borderRadius:20,fontSize:12,fontWeight:600,background:th.btnBg,color:th.btnText,border:"none",cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.18)"}}>↑</button>}
        {ghStatus&&<div style={{padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:500,background:th.surface,border:"1px solid "+th.border,color:ghStatus.startsWith("✓")?"#059669":ghStatus.startsWith("⏳")?th.sub:th.danger,pointerEvents:"none"}}>{ghStatus}</div>}
        {saveStatus!=="idle"&&<div style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:20,fontSize:11,background:saveStatus==="saved"?"#f0fdf4":th.surface,border:saveStatus==="saved"?"1px solid #86efac":"1px solid "+th.border,color:saveStatus==="saved"?"#059669":th.sub,pointerEvents:"none"}}>{saveStatus==="saving"&&<span style={{width:6,height:6,borderRadius:"50%",background:th.sub,animation:"pulse 1s infinite",display:"inline-block"}}/>}{saveStatus==="saving"?t.saving:"✓ "+t.saved}</div>}
      </div>

      {/* Header */}
      <div style={{padding:"28px 24px 16px",borderBottom:"1px solid "+th.border}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div><p style={{...lbl,marginBottom:3}}>Gestion financière</p><h1 style={{fontSize:20,color:th.text,fontWeight:600,margin:0}}>Budget</h1></div>
          <div style={{textAlign:"right",cursor:"pointer"}} onClick={!editingBal?startEditBal:undefined}>
            <p style={{...lbl,margin:"0 0 2px"}}>{t.curBalLbl}</p>
            {editingBal
              ?<input ref={balRef} type="number" inputMode="decimal" step="0.01" value={balInput} onChange={e=>setBalInput(e.target.value)} onBlur={commitEditBal} onKeyDown={e=>{if(e.key==="Enter")commitEditBal();if(e.key==="Escape")setEditingBal(false);}} style={{width:130,textAlign:"right",fontSize:20,fontWeight:600,color:th.text,background:"transparent",border:"none",borderBottom:"2px solid "+th.text,outline:"none",fontVariantNumeric:"tabular-nums"}}/>
              :<p style={{fontSize:20,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:curBal>=0?th.pos:th.neg}}>{fA(curBal,cur,true)}</p>}
          </div>
        </div>
      </div>

      {/* Main tabs */}
      <div style={{padding:"0 24px",borderBottom:"1px solid "+th.border,display:"flex",gap:0,overflowX:"auto",background:th.bg}}>
        {[["accueil",0],["transactions",1],["budget",2],["analyse",3],["simulation",4],["settings",5]].map(([k,i])=>(
          <button key={k} onClick={()=>setTab(k)} style={{fontSize:13,paddingBottom:12,paddingTop:14,paddingLeft:8,paddingRight:8,border:"none",background:"none",cursor:"pointer",borderBottom:tab===k?"2px solid "+th.text:"2px solid transparent",color:tab===k?th.text:th.muted,fontWeight:tab===k?500:400,whiteSpace:"nowrap",marginRight:8}}>{t.MAIN_TABS[i]}</button>
        ))}
      </div>

      {/* Sub-tabs */}
      {tab==="transactions"&&<SubBar tabs={t.SUB_TX} value={subs.transactions} onChange={v=>setSub("transactions",v)} th={th} action={{label:"＋ "+t.add,fn:()=>openForm()}}/>}
      {tab==="budget"&&<SubBar tabs={t.SUB_BUD} value={subs.budget} onChange={v=>setSub("budget",v)} th={th}/>}
      {tab==="analyse"&&<SubBar tabs={t.SUB_ANA} value={subs.analyse} onChange={v=>setSub("analyse",v)} th={th}/>}
      {tab==="simulation"&&<SubBar tabs={t.SUB_SIM} value={subs.simulation} onChange={v=>setSub("simulation",v)} th={th}/>}
      {tab==="settings"&&<SubBar tabs={t.SUB_SET} value={subs.settings} onChange={v=>setSub("settings",v)} th={th}/>}

      <div style={{padding:"24px",maxWidth:640}}>

        {/* ══ ACCUEIL – Tableau de bord ══ */}
        {tab==="accueil"&&<div className="fade">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:hasSummary?16:20}}>
            <MNav yr={yr} mo={mo} onPrev={prevMo} onNext={nextMo} onDbl={goToday} months={MONTHS} th={th}/>
            <Seg opts={[["daily",t.modDay],["balance",t.modBal]]} value={calMode} onChange={setCalMode} th={th}/>
          </div>
          {hasSummary&&<div style={{marginBottom:18,paddingBottom:18,borderBottom:"1px solid "+th.border,display:"flex",flexWrap:"wrap",gap:"14px 24px"}}>
            {disp.endBal&&endBal!==null&&<div><p style={{...lbl,margin:"0 0 3px"}}>{t.endBalLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:endBal>=0?th.pos:th.neg}}>{fA(endBal,cur,true)}</p></div>}
            {disp.revExp&&<><div><p style={{...lbl,margin:"0 0 3px"}}>{t.revLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:th.pos}}>+{fA(monthStats.inc,cur,true)}</p></div><div><p style={{...lbl,margin:"0 0 3px"}}>{t.expLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:th.neg}}>−{fA(monthStats.exp,cur,true)}</p></div></>}
            {disp.net&&<div><p style={{...lbl,margin:"0 0 3px"}}>{t.netLbl}</p><p style={{fontSize:15,fontWeight:600,fontVariantNumeric:"tabular-nums",margin:0,color:monthStats.net>=0?th.pos:th.neg}}>{monthStats.net>=0?"+":"−"}{fA(monthStats.net,cur,true)}</p></div>}
          </div>}
          <CalGrid/>
        </div>}

        {/* ══ TRANSACTIONS ══ */}
        {tab==="transactions"&&<div className="fade">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <MNav yr={yr} mo={mo} onPrev={prevMo} onNext={nextMo} onDbl={goToday} months={MONTHS} th={th}/>
            <p style={{...lbl,margin:0}}>{monthTxs.length} tx</p>
          </div>
          {/* Historique */}
          {subs.transactions===0&&(monthTxs.length===0
            ?<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:32,color:th.border,marginBottom:8}}>◎</p><p style={{fontSize:13,color:th.muted}}>{t.noTx}</p></div>
            :monthTxs.map(tx=><TxRow key={tx.id} tx={tx}/>))}
          {/* Récurrentes */}
          {subs.transactions===1&&<div>
            <p style={{...lbl,marginBottom:16}}>{recurTxs.length} {isFr?"transactions récurrentes":"recurring transactions"}</p>
            {recurTxs.length===0?<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:13,color:th.muted}}>{t.noTx}</p></div>
            :recurTxs.map(tx=><TxRow key={tx.id} tx={tx} showRec/>)}
          </div>}
        </div>}

        {/* ══ BUDGET ══ */}
        {tab==="budget"&&<div className="fade">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <MNav yr={yr} mo={mo} onPrev={prevMo} onNext={nextMo} onDbl={goToday} months={MONTHS} th={th}/>
          </div>
          {/* Par catégorie */}
          {subs.budget===0&&<div>
            {totalBudget>0&&<Card th={th} style={{padding:"14px 16px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:13,color:th.text,fontWeight:500}}>{isFr?"Total dépenses":"Total expenses"}</span>
                <span style={{fontSize:13,fontWeight:600,fontVariantNumeric:"tabular-nums",color:totalSpent>totalBudget?th.neg:th.pos}}>{fA(totalSpent,cur,true)} <span style={{color:th.muted,fontWeight:400}}>{t.budgetOf} {fA(totalBudget,cur,true)}</span></span>
              </div>
              <div style={{height:6,background:th.surface,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:Math.min(totalSpent/totalBudget*100,100)+"%",background:totalSpent>totalBudget?"#ef4444":totalSpent/totalBudget>0.8?"#f59e0b":"#10b981",borderRadius:3,transition:"width 0.4s"}}/></div>
            </Card>}
            {CATS.filter(c=>c.id!=="income").map(cat=>{
              const spent=catStats[cat.id]?.spent||0;const budget=budgets[cat.id]||0;
              const pct=budget>0?Math.min(spent/budget*100,100):0;const over=budget>0&&spent>budget;
              return(<Card key={cat.id} th={th} style={{padding:"12px 14px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                      <span style={{fontSize:13,color:th.text,fontWeight:500}}>{cn[cat.id]}</span>
                      <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                        <span style={{fontSize:12,fontVariantNumeric:"tabular-nums",color:over?th.neg:spent>0?th.text:th.muted}}>{fA(spent,cur,true)}</span>
                        {budget>0&&<span style={{fontSize:11,color:th.muted}}>{t.budgetOf}</span>}
                        <input type="number" min={0} step={10} value={budget||""} onChange={e=>setBudgets(b=>({...b,[cat.id]:parseFloat(e.target.value)||0}))} placeholder={t.budgetUnset} style={{width:68,fontSize:12,textAlign:"right",color:"#2563eb",background:"transparent",border:"none",borderBottom:"1px dashed "+th.inputBorder,outline:"none",fontVariantNumeric:"tabular-nums"}}/>
                      </div>
                    </div>
                    <div style={{height:5,background:th.surface,borderRadius:2.5,overflow:"hidden"}}>{budget>0&&<div style={{height:"100%",width:pct+"%",background:over?"#ef4444":pct>80?"#f59e0b":"#10b981",borderRadius:2.5,transition:"width 0.4s"}}/>}</div>
                  </div>
                </div>
              </Card>);
            })}
          </div>}
          {/* Objectifs d'épargne */}
          {subs.budget===1&&<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <p style={{...lbl,margin:0}}>{t.SUB_BUD[1]}</p>
              <button onClick={()=>setGoalForm({id:null,name:"",target:"",saved:""})} style={{fontSize:12,color:th.sub,background:"none",border:"1px solid "+th.border,borderRadius:8,padding:"5px 12px",cursor:"pointer"}}>＋ {t.addGoal}</button>
            </div>
            {goals.length===0&&<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:32,color:th.border,marginBottom:8}}>🎯</p><p style={{fontSize:13,color:th.muted}}>{t.noData}</p></div>}
            {goals.map(g=>{const pct=g.target>0?Math.min(g.saved/g.target*100,100):0;return(
              <Card key={g.id} th={th} style={{padding:"14px 16px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div><p style={{fontSize:13,color:th.text,fontWeight:500,margin:0}}>{g.name}</p><p style={{fontSize:11,color:th.muted,margin:"2px 0 0",fontVariantNumeric:"tabular-nums"}}>{fA(g.saved,cur,true)} {t.budgetOf} {fA(g.target,cur,true)}</p></div>
                  <div style={{display:"flex",gap:6}}><button onClick={()=>setGoalForm({...g,target:String(g.target),saved:String(g.saved)})} style={{fontSize:12,color:th.muted,background:"none",border:"none",cursor:"pointer"}}>✎</button><button onClick={()=>setGoals(prev=>prev.filter(x=>x.id!==g.id))} style={{fontSize:12,color:th.danger,background:"none",border:"none",cursor:"pointer"}}>✕</button></div>
                </div>
                <div style={{height:8,background:th.surface,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:pct>=100?th.pos:"#3b82f6",borderRadius:4,transition:"width 0.4s"}}/></div>
                <p style={{fontSize:11,color:th.muted,margin:"5px 0 0",textAlign:"right"}}>{pct.toFixed(0)}%</p>
              </Card>
            );})}
          </div>}
        </div>}

        {/* ══ ANALYSE ══ */}
        {tab==="analyse"&&<div className="fade">
          {/* Statistiques */}
          {subs.analyse===0&&<div>
            <p style={{...lbl,marginBottom:12}}>{t.statsTitle}</p>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{[isFr?"Mois":"Month","Revenus","Dépenses","Net","Solde"].map(h=><th key={h} style={{textAlign:"right",padding:"8px 6px",color:th.muted,fontWeight:500,borderBottom:"1px solid "+th.border,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                <tbody>{statsData.map((row,i)=>{const isNow=row.yr===TODAY.getFullYear()&&row.mo===TODAY.getMonth();return(
                  <tr key={i} style={{background:isNow?th.surface:"transparent"}}>
                    <td style={{padding:"9px 6px",color:isNow?th.text:th.sub,fontWeight:isNow?600:400,whiteSpace:"nowrap",borderBottom:"1px solid "+th.border}}>{MONTHS[row.mo].slice(0,3)} {row.yr}</td>
                    <td style={{textAlign:"right",padding:"9px 6px",color:th.pos,fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:"1px solid "+th.border}}>{fA(row.inc,cur)}</td>
                    <td style={{textAlign:"right",padding:"9px 6px",color:th.neg,fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:"1px solid "+th.border}}>{fA(row.exp,cur)}</td>
                    <td style={{textAlign:"right",padding:"9px 6px",color:row.net>=0?th.pos:th.neg,fontWeight:600,fontVariantNumeric:"tabular-nums",borderBottom:"1px solid "+th.border}}>{row.net>=0?"+":"−"}{fA(row.net,cur)}</td>
                    <td style={{textAlign:"right",padding:"9px 6px",color:row.bal>=0?th.pos:th.neg,fontWeight:600,fontVariantNumeric:"tabular-nums",borderBottom:"1px solid "+th.border}}>{fA(row.bal,cur)}</td>
                  </tr>
                );})}</tbody>
              </table>
            </div>
          </div>}
          {/* Graphiques */}
          {subs.analyse===1&&<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <MNav yr={yr} mo={mo} onPrev={prevMo} onNext={nextMo} onDbl={goToday} months={MONTHS} th={th}/>
            </div>
            {totalSpent===0?<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:13,color:th.muted}}>{t.noData}</p></div>
            :<div>
              <p style={{...lbl,marginBottom:12}}>{t.chartsTitle}</p>
              {CATS.filter(c=>c.id!=="income"&&(catStats[c.id]?.spent||0)>0).sort((a,b)=>(catStats[b.id]?.spent||0)-(catStats[a.id]?.spent||0)).map(cat=>{
                const spent=catStats[cat.id]?.spent||0;
                const pct=totalSpent>0?spent/totalSpent*100:0;
                return(<div key={cat.id} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{cat.emoji}</span><span style={{fontSize:13,color:th.text}}>{cn[cat.id]}</span></div>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:11,color:th.muted}}>{pct.toFixed(0)}%</span><span style={{fontSize:13,fontWeight:600,color:th.text,fontVariantNumeric:"tabular-nums"}}>{fA(spent,cur,true)}</span></div>
                  </div>
                  <div style={{height:8,background:th.surface,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:cat.color,borderRadius:4,transition:"width 0.4s"}}/></div>
                </div>);
              })}
            </div>}
          </div>}
          {/* Habitudes */}
          {subs.analyse===2&&<div>
            <p style={{...lbl,marginBottom:4}}>{t.habTitle}</p>
            <p style={{fontSize:11,color:th.muted,marginBottom:16}}>{t.habAvg}</p>
            {habData.length===0?<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:13,color:th.muted}}>{t.noData}</p></div>
            :habData.map(cat=>{
              const maxAvg=habData[0].avg;const pct=maxAvg>0?cat.avg/maxAvg*100:0;
              return(<Card key={cat.id} th={th} style={{padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.emoji}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,color:th.text,fontWeight:500}}>{cn[cat.id]}</span>
                    <span style={{fontSize:13,fontWeight:600,color:th.neg,fontVariantNumeric:"tabular-nums"}}>−{fA(cat.avg,cur,true)}</span>
                  </div>
                  <div style={{height:5,background:th.surface,borderRadius:2.5,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:cat.color,borderRadius:2.5}}/></div>
                </div>
              </Card>);
            })}
          </div>}
        </div>}

        {/* ══ SIMULATION ══ */}
        {tab==="simulation"&&<div className="fade">
          {/* Simuler dépense */}
          {subs.simulation===0&&<div>
            <p style={{...lbl,marginBottom:16}}>{t.simExpTitle}</p>
            <Card th={th} style={{padding:"16px 18px",marginBottom:16}}>
              <div style={{marginBottom:14}}><label style={lbl}>{t.amtLbl}</label><input type="number" inputMode="decimal" value={simExpAmt} onChange={e=>setSimExpAmt(e.target.value)} placeholder="0.00" style={iSt}/></div>
              <div style={{marginBottom:4}}><label style={lbl}>{t.simExpFreqLbl}</label></div>
              <div style={{marginTop:8}}><Seg opts={t.FREQ_OPTS.map(o=>[o.v,o.l])} value={simExpFreq} onChange={setSimExpFreq} th={th}/></div>
            </Card>
            {simExpImpact&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Card th={th} style={{padding:"14px 18px"}}>
                <p style={{...lbl,margin:"0 0 4px"}}>{t.simExpImpact}</p>
                <p style={{fontSize:20,fontWeight:700,color:th.neg,fontVariantNumeric:"tabular-nums",margin:0}}>−{fA(simExpImpact.monthly,cur,true)}</p>
              </Card>
              <Card th={th} style={{padding:"14px 18px"}}>
                <p style={{...lbl,margin:"0 0 4px"}}>{t.simExpNewBal}</p>
                <p style={{fontSize:20,fontWeight:700,color:simExpImpact.newEndBal>=0?th.pos:th.neg,fontVariantNumeric:"tabular-nums",margin:0}}>{fA(simExpImpact.newEndBal,cur,true)}</p>
              </Card>
            </div>}
            {!simExpAmt&&<div style={{textAlign:"center",padding:"32px 0"}}><p style={{fontSize:13,color:th.muted}}>{isFr?"Entrez un montant pour voir l'impact.":"Enter an amount to see the impact."}</p></div>}
          </div>}
          {/* Projeter */}
          {subs.simulation===1&&<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <p style={{...lbl,margin:0}}>{t.simMonthsLbl}</p>
              <select value={simMonths} onChange={e=>setSimMonths(Number(e.target.value))} style={{fontSize:13,color:th.text,background:th.surface,border:"1px solid "+th.border,borderRadius:8,padding:"5px 8px",cursor:"pointer",outline:"none"}}>{[3,6,12,18,24,36].map(n=><option key={n} value={n}>{n}</option>)}</select>
            </div>
            {simProj.map((row,i)=>{const isNow=row.yr===TODAY.getFullYear()&&row.mo===TODAY.getMonth();const maxAbs=Math.max(...simProj.map(r=>Math.abs(r.net)),1);const barW=Math.abs(row.net)/maxAbs*100;return(
              <div key={i} style={{marginBottom:8,background:isNow?th.surface:th.cardBg,border:"1px solid "+(isNow?th.text:th.border),borderRadius:14,padding:"12px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                  <span style={{fontSize:13,color:th.text,fontWeight:isNow?600:400}}>{MONTHS[row.mo].slice(0,3)} {row.yr}</span>
                  <div style={{display:"flex",gap:14,alignItems:"baseline"}}>
                    <span style={{fontSize:11,color:row.net>=0?th.pos:th.neg,fontVariantNumeric:"tabular-nums"}}>{row.net>=0?"+":"−"}{fA(row.net,cur)}</span>
                    <span style={{fontSize:13,fontWeight:600,fontVariantNumeric:"tabular-nums",color:row.bal>=0?th.pos:th.neg}}>{fA(row.bal,cur,true)}</span>
                  </div>
                </div>
                <div style={{height:4,background:th.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:barW+"%",background:row.net>=0?"#059669":"#ef4444",borderRadius:2}}/></div>
              </div>
            );})}
          </div>}
          {/* Scénarios */}
          {subs.simulation===2&&<div>
            <p style={{...lbl,marginBottom:16}}>{t.scenTitle}</p>
            <Card th={th} style={{padding:"16px 18px",marginBottom:16}}>
              <div style={{marginBottom:14}}>
                <label style={lbl}>{t.scenDeltaInc} ($)</label>
                <input type="number" value={scenDeltaInc} onChange={e=>setScenDeltaInc(parseFloat(e.target.value)||0)} style={iSt}/>
              </div>
              <div>
                <label style={lbl}>{t.scenDeltaExp} ($)</label>
                <input type="number" value={scenDeltaExp} onChange={e=>setScenDeltaExp(parseFloat(e.target.value)||0)} style={iSt}/>
              </div>
            </Card>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{padding:"10px 12px",background:th.surface,borderRadius:10,textAlign:"center"}}><p style={{...lbl,margin:"0 0 4px"}}>{t.scenBase}</p><p style={{fontSize:14,fontWeight:600,color:th.text,margin:0,fontVariantNumeric:"tabular-nums"}}>{fA(scenData[0]?.balA||0,cur,true)}</p></div>
              <div style={{padding:"10px 12px",background:"#2563eb15",border:"1px solid #2563eb44",borderRadius:10,textAlign:"center"}}><p style={{...lbl,margin:"0 0 4px",color:"#2563eb"}}>{t.scenMod}</p><p style={{fontSize:14,fontWeight:600,color:"#2563eb",margin:0,fontVariantNumeric:"tabular-nums"}}>{fA(scenData[0]?.balB||0,cur,true)}</p></div>
            </div>
            {scenData.map((row,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid "+th.border}}>
                <span style={{fontSize:13,color:th.sub,minWidth:70}}>{MONTHS[row.mo].slice(0,3)} {row.yr}</span>
                <div style={{display:"flex",gap:16,flex:1,justifyContent:"flex-end"}}>
                  <span style={{fontSize:12,color:row.balA>=0?th.pos:th.neg,fontVariantNumeric:"tabular-nums"}}>{fA(row.balA,cur,true)}</span>
                  <span style={{fontSize:12,fontWeight:600,color:"#2563eb",fontVariantNumeric:"tabular-nums"}}>{fA(row.balB,cur,true)}</span>
                </div>
              </div>
            ))}
          </div>}
        </div>}

        {/* ══ PARAMÈTRES ══ */}
        {tab==="settings"&&<div className="fade">
          {/* Catégories */}
          {subs.settings===0&&<div>
            <p style={{...lbl,marginBottom:16}}>{t.catSettingsTitle}</p>
            {CATS.map(cat=>(
              <div key={cat.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid "+th.border}}>
                <div style={{width:34,height:34,borderRadius:9,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.emoji}</div>
                <input type="text" value={cn[cat.id]} onChange={e=>setCustomCatNames(prev=>({...prev,[cat.id]:e.target.value}))} style={{flex:1,fontSize:13,color:th.text,background:"transparent",border:"none",borderBottom:"1px solid "+th.inputBorder,padding:"4px 0",outline:"none"}}/>
              </div>
            ))}
            <button onClick={()=>setCustomCatNames({})} style={{marginTop:14,fontSize:12,color:th.muted,background:"none",border:"1px solid "+th.border,borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>{isFr?"Réinitialiser":"Reset"}</button>
          </div>}
          {/* Sauvegarde */}
          {subs.settings===1&&<div>
            <div style={{background:th.cardBg,border:"1px solid "+th.border,borderRadius:14,padding:16,marginBottom:20,display:"flex",flexDirection:"column",gap:16}}>
              <div>
                <p style={{...lbl,margin:"0 0 10px"}}>Destination</p>
                <Seg opts={[["local","💾 Local"],["github","☁️ GitHub"]]} value={saveMode} onChange={setSaveMode} th={th}/>
              </div>
              {saveMode==="github"&&<div style={{display:"flex",flexDirection:"column",gap:12,paddingTop:4,borderTop:"1px solid "+th.border}}>
                <div><label style={lbl}>Personal Access Token</label><input type="password" value={ghToken} onChange={e=>setGhToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" style={{...iSt,fontSize:12,fontFamily:"monospace"}}/></div>
                <div><label style={lbl}>Gist ID <span style={{color:th.muted,textTransform:"none",fontSize:10,letterSpacing:0}}>(auto après 1ère sauvegarde)</span></label><input type="text" value={ghGistId} onChange={e=>setGhGistId(e.target.value)} placeholder="Laisser vide pour créer un nouveau Gist" style={{...iSt,fontSize:12,fontFamily:"monospace"}}/></div>
                <Tog label="Charger au démarrage" sub="Pull automatique depuis GitHub à l'ouverture" value={ghPullOnStart} onChange={setGhPullOnStart} th={th}/>
                {!ghPullOnStart&&<button onClick={ghPullFn} style={{padding:"10px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.text,cursor:"pointer"}}>↓ Restaurer depuis GitHub</button>}
                <p style={{fontSize:11,color:th.muted,margin:0,lineHeight:1.5}}>Gist <strong>privé</strong>. Token : permission <code>gist</code> seulement.</p>
              </div>}
              <div style={{borderTop:"1px solid "+th.border,paddingTop:14}}>
                <p style={{...lbl,margin:"0 0 10px"}}>Déclenchement</p>
                <Seg opts={[["auto","⚡ Auto (3s)"],["manual","✋ Manuel"]]} value={saveAuto?"auto":"manual"} onChange={v=>setSaveAuto(v==="auto")} th={th}/>
              </div>
              {!saveAuto&&<button onClick={handleManualSave} style={{padding:"11px 0",fontSize:13,fontWeight:600,border:"none",borderRadius:10,background:th.btnBg,color:th.btnText,cursor:"pointer"}}>↑ Sauvegarder maintenant</button>}
              {ghStatus&&<p style={{fontSize:12,margin:0,color:ghStatus.startsWith("✓")?"#059669":ghStatus.startsWith("⏳")?th.sub:th.danger}}>{ghStatus}</p>}
            </div>
            <p style={{...lbl,marginBottom:8}}>{t.savingData}</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setExportMod(true)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.text,cursor:"pointer"}}>↑ {t.exportBtn}</button>
              <button onClick={()=>{setImportText("");setImportMod(true);}} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:10,background:"none",color:th.text,cursor:"pointer"}}>↓ {t.importBtn}</button>
            </div>
          </div>}
          {/* Langue */}
          {subs.settings===2&&<div>
            <p style={{...lbl,marginBottom:12}}>{t.langLbl}</p>
            <Seg opts={t.LANG_OPTS.map(o=>[o.v,o.l])} value={lang} onChange={setLang} th={th}/>
            <div style={{marginTop:20}}>
              <p style={{...lbl,marginBottom:12}}>{t.curLbl}</p>
              <Seg opts={t.CUR_OPTS.map(o=>[o.v,o.l])} value={cur} onChange={setCur} th={th}/>
            </div>
            <div style={{padding:"12px 0",borderBottom:"1px solid "+th.border,display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20}}>
              <div><p style={{fontSize:13,color:th.text,margin:0,fontWeight:500}}>{isFr?"Solde initial":"Initial balance"}</p><p style={{fontSize:11,color:th.muted,margin:"3px 0 0"}}>{isFr?"Montant de départ":"Starting amount"}</p></div>
              <div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" value={initBal} step="0.01" onChange={e=>setInitBal(parseFloat(e.target.value)||0)} style={{width:96,textAlign:"right",fontSize:13,color:"#2563eb",background:"transparent",border:"none",outline:"none",fontVariantNumeric:"tabular-nums"}}/><span style={{fontSize:11,color:th.muted}}>$</span></div>
            </div>
          </div>}
          {/* Apparence */}
          {subs.settings===3&&<div>
            <p style={{...lbl,marginBottom:12}}>{t.darkLbl}</p>
            <Seg opts={[["off",t.darkOff],["auto",t.darkAuto],["on",t.darkOn]]} value={darkMode} onChange={setDarkMode} th={th}/>
            <div style={{marginTop:20}}>
              <p style={{...lbl,marginBottom:12}}>{isFr?"Résumé du mois":"Month summary"}</p>
              <Tog label={t.showEndBal} value={disp.endBal} onChange={v=>setDisp(d=>({...d,endBal:v}))} th={th}/>
              <Tog label={t.showRevExp} value={disp.revExp} onChange={v=>setDisp(d=>({...d,revExp:v}))} th={th}/>
              <Tog label={t.showNet} value={disp.net} onChange={v=>setDisp(d=>({...d,net:v}))} th={th}/>
            </div>
            <div style={{marginTop:20,padding:"16px",background:isDark?"rgba(239,68,68,0.07)":"#fff5f5",border:"1px solid "+th.danger+"44",borderRadius:14}}>
              <p style={{fontSize:13,color:th.danger,margin:"0 0 2px",fontWeight:600}}>{t.delAccLbl}</p>
              <p style={{fontSize:11,color:th.muted,margin:"0 0 12px"}}>{t.delAccSub}</p>
              <button onClick={()=>{setDelAccMod(true);setDelAccInput("");}} style={{fontSize:13,color:th.danger,background:"none",border:"1px solid "+th.danger,borderRadius:10,padding:"8px 16px",cursor:"pointer"}}>{t.delAccLbl} →</button>
            </div>
            <button onClick={()=>{setAuth(false);setU("");setPw("");}} style={{marginTop:16,fontSize:13,color:th.muted,background:"none",border:"none",cursor:"pointer"}}>{t.logout}</button>
          </div>}
        </div>}
      </div>

      {/* ══ MODALS ══ */}
      {exportMod&&<Sheet onClose={()=>setExportMod(false)} th={th}><SHd title={t.exportBtn} onClose={()=>setExportMod(false)} th={th}/><p style={{fontSize:12,color:th.sub,marginBottom:12}}>{t.exportInstr}</p><textarea readOnly value={getJSON()} style={{width:"100%",height:160,padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:th.sub,background:th.surface,border:"1px solid "+th.border,borderRadius:10,resize:"none",boxSizing:"border-box",lineHeight:1.5}}/><div style={{display:"flex",gap:8,marginTop:12}}><button onClick={()=>setExportMod(false)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.exportClose}</button><button onClick={handleCopy} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:copied?"#059669":th.btnBg,color:copied?"#fff":th.btnText,cursor:"pointer",fontWeight:500}}>{copied?t.exportCopied:t.exportCopy}</button></div></Sheet>}
      {importMod&&<Sheet onClose={()=>setImportMod(false)} th={th}><SHd title={t.importBtn} onClose={()=>setImportMod(false)} th={th}/><p style={{fontSize:12,color:th.sub,marginBottom:12}}>{t.importInstr}</p><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder={t.importPaste} style={{width:"100%",height:200,padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:th.text,background:th.surface,border:"1px solid "+th.border,borderRadius:10,resize:"none",boxSizing:"border-box",lineHeight:1.5}}/><div style={{display:"flex",gap:8,marginTop:12}}><button onClick={()=>setImportMod(false)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button><button onClick={handleImport} disabled={!importText.trim()} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:importText.trim()?th.btnBg:th.surface,color:importText.trim()?th.btnText:th.muted,cursor:importText.trim()?"pointer":"default",fontWeight:500}}>{t.importRestore}</button></div></Sheet>}

      {/* Day modal */}
      {dayMod&&<Sheet onClose={()=>{setDayMod(null);setExpandedCatTx(null);}} th={th}>
        <SHd title={MONTHS[mo]+" "+dayMod.day} onClose={()=>{setDayMod(null);setExpandedCatTx(null);}} th={th} right={<button onClick={()=>{setDayMod(null);openForm(null,dayDateStr);}} style={{fontSize:12,color:th.sub,background:"none",border:"1px solid "+th.border,borderRadius:8,padding:"5px 12px",cursor:"pointer"}}>+ {t.add}</button>}/>
        {dayModalList.length===0?<div style={{textAlign:"center",padding:"32px 0"}}><p style={{fontSize:13,color:th.muted}}>{t.emptyDay}</p></div>
        :dayModalList.map(tx=>{const cat=catById(tx.category||"other");const isExp=expandedCatTx===tx.id;return(<div key={tx.id}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0",borderBottom:isExp?"none":"1px solid "+th.border}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}} onClick={()=>setExpandedCatTx(isExp?null:tx.id)}>
              <div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,border:"2px solid "+(isExp?cat.color:"transparent"),transition:"border 0.15s"}}>{cat.emoji}</div>
              <div><p style={{fontSize:13,color:th.text,margin:0,fontWeight:500}}>{tx.description}</p><p style={{fontSize:11,margin:"2px 0 0",color:cat.color,fontWeight:500}}>{cn[cat.id]} · {tx.type==="income"?t.incomeLbl:t.expenseLbl}</p></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <span style={{fontSize:13,fontWeight:500,fontVariantNumeric:"tabular-nums",color:tx.type==="income"?th.pos:th.neg}}>{tx.type==="income"?"+":"−"}{fA(tx.amount,cur,true)}</span>
              <button onClick={e=>{e.stopPropagation();openDel(tx,dayDateStr);}} style={{fontSize:15,color:th.muted,background:"none",border:"none",cursor:"pointer",padding:"4px 6px",lineHeight:1}}>✕</button>
            </div>
          </div>
          {isExp&&<div style={{padding:"10px 0 16px 46px",borderBottom:"1px solid "+th.border}}><p style={{fontSize:10,color:th.muted,letterSpacing:"0.1em",textTransform:"uppercase",margin:"0 0 8px"}}>{t.quickCatLbl}</p><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{CATS.map(c=>(<button key={c.id} onClick={()=>changeTxCat(tx.id,c.id)} title={cn[c.id]} style={{width:36,height:36,borderRadius:9,background:c.id===cat.id?c.color+"30":th.surface,border:"2px solid "+(c.id===cat.id?c.color:"transparent"),fontSize:18,cursor:"pointer"}}>{c.emoji}</button>))}</div></div>}
        </div>);})}
      </Sheet>}

      {/* Delete modal */}
      {delMod&&<Sheet onClose={()=>setDelMod(null)} th={th}>
        <h3 style={{fontSize:15,color:th.text,fontWeight:600,margin:"0 0 4px"}}>{t.delTitle}</h3>
        <p style={{fontSize:12,color:th.muted,margin:"0 0 20px"}}>{delMod.tx.description}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {normRec(delMod.tx.recurrence,parseD(delMod.tx.startDate)).type==="once"
            ?<button onClick={()=>handleDel("all")} style={{padding:"13px 16px",textAlign:"left",fontSize:14,color:"#ef4444",background:isDark?"rgba(239,68,68,0.1)":"#fff5f5",border:"none",borderRadius:12,cursor:"pointer",fontWeight:500}}>{t.allEvts}</button>
            :[["this",t.thisEvt],["follow",t.thisFollow],["all",t.allEvts]].map(([sc,lb])=>(<button key={sc} onClick={()=>handleDel(sc)} style={{padding:"13px 16px",textAlign:"left",fontSize:14,color:sc==="all"?"#ef4444":th.text,background:sc==="all"?(isDark?"rgba(239,68,68,0.1)":"#fff5f5"):th.surface,border:"none",borderRadius:12,cursor:"pointer",fontWeight:sc==="all"?500:400}}>{lb}</button>))}
        </div>
        <button onClick={()=>setDelMod(null)} style={{width:"100%",marginTop:12,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button>
      </Sheet>}

      {/* Delete account modal */}
      {delAccMod&&<Sheet onClose={()=>{setDelAccMod(false);setDelAccInput("");}} th={th}>
        <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40,marginBottom:12}}>⚠️</div><h3 style={{fontSize:16,color:th.text,fontWeight:700,margin:"0 0 8px"}}>{isFr?"Confirmer la suppression":"Confirm deletion"}</h3><p style={{fontSize:13,color:th.sub,margin:0,lineHeight:1.6}}>{t.delAccModalBody}</p></div>
        <div style={{background:th.surface,borderRadius:10,padding:"10px 14px",textAlign:"center",marginBottom:16}}><span style={{fontSize:16,fontWeight:700,letterSpacing:"0.1em",color:th.danger}}>{t.delAccWord}</span></div>
        <input type="text" value={delAccInput} onChange={e=>setDelAccInput(e.target.value)} placeholder={t.delAccWord} style={{...iSt,textAlign:"center",fontSize:15,fontWeight:600,letterSpacing:"0.05em",borderColor:delAccInput===t.delAccWord?"#059669":th.inputBorder,color:delAccInput===t.delAccWord?"#059669":th.text,marginBottom:16}}/>
        <div style={{display:"flex",gap:8}}><button onClick={()=>{setDelAccMod(false);setDelAccInput("");}} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button><button onClick={()=>{if(delAccInput===t.delAccWord){deleteAccount();setDelAccMod(false);}}} disabled={delAccInput!==t.delAccWord} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:delAccInput===t.delAccWord?"#ef4444":th.surface,color:delAccInput===t.delAccWord?"#fff":th.muted,cursor:delAccInput===t.delAccWord?"pointer":"default",fontWeight:500}}>{isFr?"Supprimer définitivement":"Delete permanently"}</button></div>
      </Sheet>}

      {/* Transaction form */}
      {formMod&&<Sheet onClose={()=>setFormMod(null)} th={th}>
        <SHd title={formMod.tx?t.editTx:t.newTx} onClose={()=>setFormMod(null)} th={th}/>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {[["expense",t.expenseLbl],["income",t.incomeLbl]].map(([v,l])=>(<button key={v} onClick={()=>handleTypeChange(v)} style={{flex:1,padding:"9px 0",fontSize:13,borderRadius:10,border:"none",cursor:"pointer",fontWeight:500,background:formMod.form.type===v?(v==="income"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.10)"):th.surface,color:formMod.form.type===v?(v==="income"?"#059669":"#ef4444"):th.muted}}>{l}</button>))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div><label style={lbl}>{t.descLbl}</label><input type="text" value={formMod.form.desc} onChange={e=>setFF("desc")(e.target.value)} style={iSt}/></div>
          <div><label style={lbl}>{t.amtLbl}</label><input type="number" value={formMod.form.amt} step="0.01" placeholder="0.00" onChange={e=>setFF("amt")(e.target.value)} style={iSt}/></div>
          <div><label style={lbl}>{t.startLbl}</label><input type="date" value={formMod.form.date} onChange={e=>handleDateChange(e.target.value)} style={iSt}/></div>
          <div><label style={lbl}>{t.catLbl}</label><CatPicker value={formMod.form.cat} onChange={v=>setFF("cat")(v)} th={th} cn={cn}/></div>
          <RecPicker value={formMod.form.rec} onChange={v=>setFF("rec")(v)} startDate={formMod.form.date} t={t} th={th}/>
        </div>
        <div style={{display:"flex",gap:8,marginTop:24,alignItems:"center"}}>
          {formMod.tx&&<button onClick={()=>{setDelMod({tx:formMod.tx,dateStr:formMod.tx.startDate});setFormMod(null);}} style={{fontSize:13,color:th.danger,background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>{t.delBtn}</button>}
          <button onClick={()=>setFormMod(null)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button>
          <button onClick={saveForm} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:th.btnBg,color:th.btnText,cursor:"pointer",fontWeight:500}}>{formMod.tx?t.save:t.add}</button>
        </div>
      </Sheet>}

      {/* Goal form */}
      {goalForm&&<Sheet onClose={()=>setGoalForm(null)} th={th}>
        <SHd title={goalForm.id?isFr?"Modifier l'objectif":"Edit goal":t.addGoal} onClose={()=>setGoalForm(null)} th={th}/>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div><label style={lbl}>{t.goalName}</label><input type="text" value={goalForm.name} onChange={e=>setGoalForm(g=>({...g,name:e.target.value}))} style={iSt}/></div>
          <div><label style={lbl}>{t.goalTarget}</label><input type="number" value={goalForm.target} step="0.01" placeholder="0.00" onChange={e=>setGoalForm(g=>({...g,target:e.target.value}))} style={iSt}/></div>
          <div><label style={lbl}>{t.goalSaved}</label><input type="number" value={goalForm.saved} step="0.01" placeholder="0.00" onChange={e=>setGoalForm(g=>({...g,saved:e.target.value}))} style={iSt}/></div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:24}}>
          <button onClick={()=>setGoalForm(null)} style={{flex:1,padding:"11px 0",fontSize:13,border:"1px solid "+th.border,borderRadius:12,background:"none",color:th.sub,cursor:"pointer"}}>{t.cancel}</button>
          <button onClick={()=>{const tgt=parseFloat(goalForm.target)||0;const svd=parseFloat(goalForm.saved)||0;if(!goalForm.name.trim()||tgt<=0)return;if(goalForm.id){setGoals(prev=>prev.map(g=>g.id===goalForm.id?{...g,name:goalForm.name,target:tgt,saved:svd}:g));}else{setGoals(prev=>[...prev,{id:Date.now().toString(),name:goalForm.name,target:tgt,saved:svd}]);}setGoalForm(null);}} style={{flex:2,padding:"11px 0",fontSize:13,border:"none",borderRadius:12,background:th.btnBg,color:th.btnText,cursor:"pointer",fontWeight:500}}>{goalForm.id?t.save:t.add}</button>
        </div>
      </Sheet>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
